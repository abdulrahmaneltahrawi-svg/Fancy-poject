<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="imges/img/fancy1.jfif" />
    <title>Profile Page</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <style>
      .navbar {
        display: flex;
        justify-content: space-between;
        padding: 15px 50px;
        border-bottom: 1px solid #ddd;
      }

      .profile-container {
        text-align: center;
        margin-top: 50px;
      }

      .avatar {
        width: 120px;
        height: 120px;
        background: #ddd;
        border-radius: 50%;
        margin: 0 auto 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 50px;
      }

      .tabs {
        margin-top: 40px;
        border-bottom: 1px solid #eee;
      }
      .tabs a {
        margin: 0 20px;
        text-decoration: none;
        color: #666;
        padding-bottom: 10px;
        display: inline-block;
      }
      .tabs a.active {
        border-bottom: 2px solid #000;
        color: #000;
        font-weight: bold;
      }

      .create-section {
        margin-top: 50px;
        display: inline-block;
      }
      .add-box {
        width: 150px;
        height: 150px;
        border: 2px dashed #ccc;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        cursor: pointer;
      }

      .add-box:hover {
        background: #eee;
        transition: background 0.2s;
      }
      
      .hidden {
        display: none !important;
      }
    </style>

    <div id="header-placeholder"></div>

    <main class="profile-container">
      <div class="avatar" id="prof-avatar">...</div>
      <h1 id="prof-name">loading...</h1>
      <h2
        id="prof-type"
        style="font-weight: normal; color: #666; margin-bottom: 20px"
      >
        ...
      </h2>
      <p>Joined on: <span id="prof-date">...</span></p>

      <nav class="tabs">
        <a href="javascript:void(0)" class="active" id="tab-overview"
          >Overview</a
        >
        <a href="javascript:void(0)" id="tab-brands">Brands</a>

        <a href="javascript:void(0)" id="tab-designers"> Designer</a>
      </nav>

      <!-- حاوية نظرة عامة -->
      <div id="overview-tab-content" class="tab-content">
        <div
          style="
            max-width: 600px;
            margin: 30px auto;
            text-align: left;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            border: 1px solid #eee;
            line-height: 2;
          "
        >
          <h3
            style="
              border-bottom: 1px solid #eee;
              padding-bottom: 10px;
              margin-bottom: 15px;
            "
          >
            Account Information
          </h3>
          <p><strong>Email:</strong> <span id="prof-email">...</span></p>
          <p><strong>Number:</strong> <span id="prof-phone">...</span></p>
          <p>
            <strong>Account status:</strong>
            <span id="prof-status" style="color: green">...</span>
          </p>
        </div>
      </div>

      <!-- حاوية عرض البراندات الخاصة بالمستخدم -->
      <div id="brands-tab-content" class="hidden">
        <div id="user-brands-list" class="brands-container"></div>
      </div>

      <!-- حاوية عرض المصممين الخاصة بالمستخدم -->
      <div id="designers-tab-content" class="hidden">
        <div id="user-designers-list" class="brands-container"></div>
      </div>

      <!-- زر الإضافة (براند أو منتج جديد) -->
      <div class="create-section" id="create-section-wrapper">
        <a
          href="add-brand.html"
          id="create-action-link"
          class="hidden"
          style="text-decoration: none; color: inherit"
        >
          <div class="add-box">+</div>
          <p
            id="create-action-text"
            style="margin-top: 10px; font-weight: bold; color: #333"
          >
            Create a new brand
          </p>
        </a>
      </div>
    </main>

    <div id="footer-placeholder"></div>
  </body>
  <script src="js/script.js"></script>
  <script src="js/products.js"></script>
  <script src="js/brands.js"></script>
  <script src="js/designers.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
    // 1. تحميل بيانات البروفايل عند فتح الصفحة
    if (typeof loadUserProfile === "function") {
      loadUserProfile();
    }

    // 2. منطق التبديل بين التبويبات
    const tabLinks = document.querySelectorAll('.tabs a');
    const contents = {
      'tab-overview': 'overview-tab-content',
      'tab-brands': 'brands-tab-content',
      'tab-designers': 'designers-tab-content'
    };

    tabLinks.forEach(link => {
      link.addEventListener('click', function() {
        // إخفاء الكل
        document.querySelectorAll('.tab-content, .hidden').forEach(c => c.style.display = 'none');
        // إزالة active
        tabLinks.forEach(t => t.classList.remove('active'));

        // تفعيل المختار
        this.classList.add('active');
        const contentId = contents[this.id];
        if (contentId) {
          const el = document.getElementById(contentId);
          if (el) el.style.display = 'block';
        }
      });
    });
  });
  </script>
</html>
