<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Profile Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <style>


.navbar { display: flex; justify-content: space-between; padding: 15px 50px; border-bottom: 1px solid #ddd; }

.profile-container { text-align: center; margin-top: 50px; }

.avatar { 
    width: 120px; height: 120px; background: #ddd; 
    border-radius: 50%; margin: 0 auto 20px; 
    display: flex; align-items: center; justify-content: center; font-size: 50px;
}

.tabs { margin-top: 40px; border-bottom: 1px solid #eee; }
.tabs a { margin: 0 20px; text-decoration: none; color: #666; padding-bottom: 10px; display: inline-block; }
.tabs a.active { border-bottom: 2px solid #000; color: #000; font-weight: bold; }

.create-section { margin-top: 50px; display: inline-block; }
.add-box { 
    width: 150px; height: 150px; border: 2px dashed #ccc; 
    border-radius: 50%; display: flex; align-items: center; 
    justify-content: center; font-size: 40px; cursor: pointer;
}
.hidden { display: none !important; }
    </style>

    <div id="header-placeholder"></div>

    <main class="profile-container">
        <div class="avatar" id="prof-avatar">...</div>
        <h1 id="prof-name">جاري التحميل...</h1>
        <h2 id="prof-type" style="font-weight: normal; color: #666; margin-bottom: 20px;">...</h2>
        <p>انضم في: <span id="prof-date">...</span></p>
        


        <nav class="tabs">
            <a href="javascript:void(0)" class="active" id="tab-overview">نظرة عامة</a>
            <a href="javascript:void(0)" id="tab-brands">البراندات</a>  
        </nav>

        <!-- حاوية نظرة عامة -->
        <div id="overview-tab-content" class="tab-content">
            <div style="max-width: 600px; margin: 30px auto; text-align: right; padding: 20px; background: #fff; border-radius: 8px; border: 1px solid #eee; line-height: 2;">
                <h3 style="border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px;">معلومات الحساب</h3>
                <p style="direction: rtl;"><strong>البريد الإلكتروني:</strong> <span id="prof-email">...</span></p>
                <p><strong>رقم الهاتف:</strong> <span id="prof-phone">...</span></p>
                <p><strong>حالة الحساب:</strong> <span id="prof-status" style="color: green;">...</span></p>
            </div>
        </div>

        <!-- حاوية عرض البراندات الخاصة بالمستخدم -->
        <div id="brands-tab-content" class="hidden">
            <div id="user-brands-list" class="brands-container"></div>
        </div>

        <a href="add-designer.html" id="create-action-link" class="create-section hidden" style="text-decoration: none; color: inherit;">
            <div class="add-box">+</div>
            <p id="create-action-text">...</p>
        </a>
    </main>

    <div id="footer-placeholder"></div>

</body>
<script src="js/script.js"></script>
<script src="js/brands.js"></script>
<script src="js/auth.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (typeof loadUserProfile === 'function') {
            loadUserProfile();
        }

        // منطق التبديل بين التبويبات
        const tabOverview = document.getElementById('tab-overview');
        const tabBrands = document.getElementById('tab-brands');
        const overviewContent = document.getElementById('overview-tab-content');
        const brandsContent = document.getElementById('brands-tab-content');

        tabOverview.addEventListener('click', () => {
            tabOverview.classList.add('active');
            tabBrands.classList.remove('active');
            overviewContent.classList.remove('hidden');
            brandsContent.classList.add('hidden');
        });

        tabBrands.addEventListener('click', () => {
            tabBrands.classList.add('active');
            tabOverview.classList.remove('active');
            brandsContent.classList.remove('hidden');
            overviewContent.classList.add('hidden');
        });
    });
</script>
</html>
