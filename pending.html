<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>صفحة الادمن - Fancy Design</title>
    <link rel="icon" href="imges/img/fancy1.jfif" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
 
    <div id="header-placeholder"></div>

    <section class="projects-section">
      <p class="title" style="padding-left: 55px ;">Brands pending</p>
      <div class="container">
        <div
          id="pending-brands-list"
          class="projects-grid"
        >
          <!-- جاري التحميل... -->
        </div>
      </div>

      <p class="title" style="padding-left: 55px ;">Products pending</p>
      <div class="container">
        <div id="pending-products-container" class="projects-grid">
          <!-- جاري التحميل... -->
        </div>
      </div>

      <p class="title" style="padding-left: 55px ;">Designers pending</p>
      <div class="container">
        <div id="pending-designers-list" class="projects-grid">
          <!-- جاري التحميل... -->
        </div>
      </div>

      <p class="title" style="padding-left: 55px ;">Magazine pending</p>
      <div class="container">
        <div id="pending-projects-list" class="projects-grid">
          <!-- جاري التحميل... -->
        </div>
      </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="js/script.js"></script>
    <script src="js/products.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/brands.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (typeof loadPendingProductsForAdmin === "function") {
          loadPendingProductsForAdmin("pending-products-container");
        }
        if (typeof window.loadPendingBrandsForAdmin === "function") {
          loadPendingBrandsForAdmin("pending-brands-list");
        }
        loadPendingDesignersForAdmin("pending-designers-list");
        loadPendingProjectsForAdmin("pending-projects-list");
      });

      async function loadPendingDesignersForAdmin(containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        try {
          const result = await FancyAPI.get('/admin/pending_designer.php');
          if (result.success) {
            const designers = result.data || [];
            container.innerHTML = designers.length ? '' : '<p style="grid-column:1/-1; text-align:center;">No designers pending</p>';
            designers.forEach(designer => {
              container.innerHTML += `
                <div class="brand-card" style="border: 1px solid #eee; padding: 15px; border-radius: 8px;">
                  <a href="view_designer.html?id=${designer.id}" target="_blank" style="text-decoration:none; color:inherit;">
                    <img src="${getSafeImageUrl(designer.avatar)}" style="width:50px; height:50px; border-radius:50%; object-fit: cover;">
                    <h3>${designer.user_name}</h3>
                  </a>
                  <p>${designer.company_type || 'Designer'} - ${designer.country || ''}</p>
                  <div style="display:flex; gap:10px; margin-top:10px;">
                    <button onclick="handleDesignerAction(${designer.id}, 'approve')" style="flex:1; background:#5cb85c; color:#fff; border:none; padding:8px; border-radius:4px; cursor:pointer;">accept</button>
                    <button onclick="handleDesignerAction(${designer.id}, 'reject')" style="flex:1; background:#d9534f; color:#fff; border:none; padding:8px; border-radius:4px; cursor:pointer;">reject</button>
                  </div>
                </div>`;
            });
          }
        } catch (error) { console.error("Error loading pending designers:", error); }
      }

      async function loadPendingProjectsForAdmin(containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        try {
          const result = await FancyAPI.get('/admin/pending_projects.php');
          if (result.success) {
            const projects = result.data.projects || result.data || [];
            container.innerHTML = projects.length ? '' : '<p style="grid-column:1/-1; text-align:center;">No magazine projects pending</p>';
            projects.forEach(project => {
              container.innerHTML += `
                <div class="project-card" style="border: 1px solid #eee; padding: 15px; border-radius: 8px; background:#fff;">
                  <a href="view_magazine.html?id=${project.id}" target="_blank" style="text-decoration:none; color:inherit;">
                    <div class="card-image" style="height: 180px; overflow:hidden;">
                      <img src="${getSafeImageUrl(project.cover_image)}" style="width:100%; height:100%; object-fit: cover; border-radius: 4px;">
                    </div>
                  </a>
                  <div class="card-content">
                    <a href="view_magazine.html?id=${project.id}" target="_blank" style="text-decoration:none; color:inherit;"><h3 style="margin-top:10px; font-size:16px;">${project.title}</h3></a>
                    <p style="font-size:12px; color:#666; margin: 5px 0;">Designer: <b>${project.designer_name || 'N/A'}</b></p>
                    <p style="font-size:11px; color:#888;">Type: ${project.type} | Cat: ${project.category}</p>
                      <div style="display:flex; gap:10px; margin-top:15px;">
                      <button onclick="handleProjectAction(${project.id}, 'approve')" style="flex:1; background:#5cb85c; color:#fff; border:none; padding:8px; border-radius:4px; cursor:pointer; font-weight:bold;">Accept</button>
                      <button onclick="handleProjectAction(${project.id}, 'reject')" style="flex:1; background:#d9534f; color:#fff; border:none; padding:8px; border-radius:4px; cursor:pointer; font-weight:bold;">Reject</button>
                    </div>
                  </div>
                </div>`;
            });
          }
        } catch (error) { console.error("Error loading pending projects:", error); }
      }

      async function handleProjectAction(id, action) {
        if (!confirm(`Are you sure you want to ${action} this project?`)) return;
        const endpoint = '/admin/update_project_status.php';
        const fd = new FormData();
        fd.append('project_id', id);
        const status = action === 'approve' ? 'approved' : 'rejected';
        fd.append('status', status);

        const res = await FancyAPI.post(endpoint, fd);
        if (res.success) {
          alert(`Project ${status} successfully`);
          loadPendingProjectsForAdmin('pending-projects-list');
        } else {
          alert('Error: ' + res.message);
        }
      }

      async function handleDesignerAction(id, action) {
        if (!confirm(`Are you sure you want to ${action} this designer?`)) return;
        const endpoint = action === 'approve' ? '/admin/Approve_designer.php' : '/admin/rejected_designer.php';
        const fd = new FormData();
        fd.append('designer_id', id);
        const res = await FancyAPI.post(endpoint, fd);
        if (res.success) {
          alert(`Designer ${action}d successfully`);
          loadPendingDesignersForAdmin('pending-designers-list');
        } else {
          alert('Error: ' + res.message);
        }
      }
    </script>
  </body>
</html>
