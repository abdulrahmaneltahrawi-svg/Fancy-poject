<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>صفحة الادمن - Fancy Design</title>
    <link rel="icon" href="imges/img/fancy1.jfif" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="header-placeholder"></div>

    <section class="projects-section" style="padding-top: 40px">
      <p class="title">Pending brands</p>
      <div class="container">
        <div
          id="pending-brands-list"
          class="projects-grid"
          style="grid-template-columns: repeat(auto-fill, minmax(250px, 1fr))"
        >
          <!-- جاري التحميل... -->
        </div>
      </div>

      <p class="title" style="margin-top: 60px">Products pending review</p>
      <div class="container">
        <div id="pending-products-container" class="projects-grid">
          <!-- جاري التحميل... -->
        </div>
      </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="js/script.js"></script>
    <script src="js/products.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/brands.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (typeof loadPendingProductsForAdmin === "function") {
          loadPendingProductsForAdmin("pending-products-container");
        }
        if (typeof loadPendingBrandsForAdmin === "function") {
          loadPendingBrandsForAdmin("pending-brands-list");
        }
      });
    </script>
  </body>
</html>
