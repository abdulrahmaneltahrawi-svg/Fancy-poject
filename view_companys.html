<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brand View - Fancy Design</title>
    <link rel="icon" href="imges/img/fancy1.jfif" />
    <link rel="stylesheet" href="style.css" />
    <style>
        .brand-header { position: relative; background: #fff; }

.cover-photo {
  height: 350px;
  width: 100%;
  overflow: hidden;
}

.cover-photo img { width: 100%; height: 100%; object-fit: cover; }

.brand-profile-bar {
  padding: 0 5%;
  border-bottom: 1px solid #eee;
  position: relative;
  height: 100px;
}

.brand-logo-container {
  position: absolute;
  top: -60px; /* لرفع اللوجو فوق الغلاف */
  width: 150px;
  height: 150px;
  background: #fff;
  border-radius: 50%;
  padding: 5px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.brand-logo-container img { width: 100%; height: 100%; border-radius: 50%; }

.brand-main-info { margin-left: 170px; padding-top: 15px; }

.brand-main-info h1 { font-size: 24px; margin: 0; }

.brand-actions { position: absolute; right: 5%; top: 20px; display: flex; gap: 15px; }

.follow-btn {
  background: #e31e24;
  color: #fff;
  border: none;
  padding: 8px 30px;
  border-radius: 5px;
  cursor: pointer;
}

/* شبكة المنتجات */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.product-item img {
  width: 100%;
  aspect-ratio: 1/1;
  background: #f5f5f5;
  object-fit: contain;
}

    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <section class="brand-header">
  <div class="cover-photo">
    <img id="brandCover" src="" alt="Cover">
  </div>
  
  <div class="brand-profile-bar">
    <div class="container-flex">
      <div class="brand-logo-container">
        <img id="brandLogo" src="" alt="Logo">
      </div>
      <div class="brand-main-info">
        <h1 id="brandName"></h1>
        <p id="brandLocation"><i class="pin-icon"></i> </p>
        <span class="type-tag">Brand</span>
      </div>
      <div class="brand-actions">
        <button class="icon-btn">✉️</button>
        <button class="icon-btn">🔗</button>
        <button class="follow-btn">Follow</button>
      </div>
    </div>
  </div>
</section>

<nav class="brand-tabs">
  <button class="tab-item active">Overview</button>
  <button class="tab-item">Products</button>
  <button class="tab-item">Collections</button>
</nav>

<main class="brand-content">
  <section class="about-section">
    <h2>About</h2>
    <p id="brandAbout"></p>
  </section>

  <section class="products-grid-section">
    <h2>Products</h2>
    <div class="products-grid" id="productsGrid">
      </div>
  </section>
</main>

    <div id="footer-placeholder"></div>

    <script src="js/data_company.js"></script>
    <script>
        // وظيفة عرض البيانات
function loadBrandPage() {
  const urlParams = new URLSearchParams(window.location.search);
  const brandKey = urlParams.get('brand'); // سيجلب كلمة aarkee من الرابط
  
  const data = brandsData[brandKey];
  
  if(data) {
    document.getElementById('brandName').innerText = data.name;
    document.getElementById('brandLocation').innerText = data.location;
    document.getElementById('brandAbout').innerText = data.about;
    document.getElementById('brandCover').src = data.cover;
    document.getElementById('brandLogo').src = data.logo;
    
    // عرض المنتجات
    let productsHtml = '';
    data.products.forEach(p => {
      productsHtml += `
        <div class="product-item">
          <img src="assets/imge/${p.img}">
          <h4>${p.name}</h4>
          <p>${p.category}</p>
        </div>`;
    });
    document.getElementById('productsGrid').innerHTML = productsHtml;
  }
}

window.onload = loadBrandPage;

    </script>
    <script src="js/script.js"></script>
</body>
</html>
