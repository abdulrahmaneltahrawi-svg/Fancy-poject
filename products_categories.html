<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fancy Design</title>
    <link rel="icon" href="imges/img/fancy1.jfif" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <style>
        .categories-section {
            padding: 40px 20px;
            font-family: sans-serif;
        }

        .categories-title {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 35px;
        }

        .category-card {
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .category-card:hover {
            transform: translateY(-5px);
        }

        .category-card img {
            width: 100%;
            height: 320px;
            object-fit: cover;
        }

        .category-title {
            padding: 15px;
            background: #f8f8f8;
            margin: 0;
            font-size: 18px;
        }
    </style>
    <div id="header-placeholder"></div>


    <section class="categories-section">
    <h2 class="categories-title">Products Categories</h2>
    <div class="categories-grid">
        <div class="category-card">
            <a href="page_prodact.html">
            <img src="imges/prodact/product/Furniture.png" alt="Furniture">
            </a>
            <h3 class="category-title">Furniture</h3>
        </div>
        <div class="category-card">
            <img src="imges/prodact/product/Lighting.png" alt="Lighting">
            <h3 class="category-title">Lighting</h3>
        </div>
        <div class="category-card">
            <img src="imges/prodact/product/Finishes.png" alt="Lighting">
            <h3 class="category-title">Finishes</h3>
        </div>
        <div class="category-card">
            <img src="imges/prodact/product/Wellness.png" alt="Finishes">
            <h3 class="category-title">Wellness</h3>
        </div>
        <div class="category-card">
            <img src="imges/prodact/product/Decore.png" alt="Wellness">
            <h3 class="category-title">Decore</h3>
        </div>
    </div>
</section>


    <div id="footer-placeholder"></div>

    
    <script src="js/products.js"></script>
    <script src="js/script.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
