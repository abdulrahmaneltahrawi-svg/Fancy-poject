<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="imges/img/fancy1.jfif" />
    <title>Edit Product - Fancy Design</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .form-container {
        max-width: 600px;
        margin: 50px auto;
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 8px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      .form-group input,
      .form-group textarea,
      .form-group select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .submit-btn {
        background: #000;
        color: #fff;
        padding: 12px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="header-placeholder"></div>
    <div class="form-container">
      <h2>Edit product data</h2>
      <form id="editProductForm">
        <input type="hidden" name="product_id" />
        <input type="hidden" name="brand_id" />

        <div class="form-group">
          <label>Product Name:</label>
          <input type="text" name="product_name" required />
        </div>
        <div class="form-group">
          <label>Category:</label>
          <select name="category_id" id="category_select" required>
            <option value="">Choose category...</option>
          </select>
        </div>
        <div class="form-group">
          <label>Sub Category:</label>
          <select name="sub_category_id" id="sub_category_select" required>
            <option value="">Select category first...</option>
          </select>
        </div>
        <div class="form-group">
          <label>Product Image (Optional):</label>
          <input type="file" name="main_image" accept="image/*" />
        </div>
        <div class="form-group">
          <label>Short Description:</label>
          <textarea name="short_description" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label>Full Description:</label>
          <textarea name="description" rows="5"></textarea>
        </div>
        <button type="submit" class="submit-btn">Save Changes</button>
      </form>
    </div>
    <script src="js/script.js"></script>
    <script src="js/categories.js"></script>
    <script src="js/products.js"></script>
    <script src="js/auth.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        const params = new URLSearchParams(window.location.search);
        const productId = params.get("id");

        const form = document.getElementById("editProductForm");
        if (productId && form) {
          // تعيين المعرف من الرابط فوراً لضمان عدم إرسال النموذج فارغاً
          form.elements["product_id"].value = productId;
        }

        // 1. جلب الأقسام الرئيسية أولاً
        await loadCategoriesToSelect();

        if (productId) {
          // 2. جلب بيانات المنتج وتعبئتها في النموذج
          const result = await FancyAPI.get(
            `/products/get.php?product_id=${productId}`,
          );
          if (result.success && result.data.product) {
            const product = result.data.product;

            // تعبئة البيانات الأساسية
            form.elements["product_name"].value = product.product_name;
            form.elements["category_id"].value = product.category_id || "";
            form.elements["short_description"].value =
              product.short_description || "";
            form.elements["description"].value = product.description || "";
            form.elements["brand_id"].value = product.brand_id || "";

            // تحميل الأقسام الفرعية واختيار القسم الحالي
            if (product.category_id) {
              await handleCategoryChange(product.category_id);
              if (product.sub_category_id) {
                document.getElementById("sub_category_select").value =
                  product.sub_category_id;
              }
            }
          } else {
            alert("Failed to load product data.");
            window.location.href = "index.html";
          }
        }
      });

      async function loadCategoriesToSelect() {
        const catSelect = document.getElementById("category_select");
        try {
          const result = await FancyAPI.get("/categories/list.php");
          if (result.success && result.data && result.data.categories) {
            result.data.categories.forEach((cat) => {
              catSelect.add(new Option(cat.name, cat.id));
            });
          }
        } catch (error) {
          console.error("Error loading categories:", error);
        }
      }

      async function handleCategoryChange(catId) {
        const subSelect = document.getElementById("sub_category_select");
        subSelect.innerHTML = '<option value="">Loading...</option>';

        if (catId) {
          const subCats = await loadSubCategoriesForFilter(catId);
          subSelect.innerHTML =
            '<option value="">Choose sub category...</option>';
          subCats.forEach((sub) => {
            subSelect.add(new Option(sub.name, sub.id)); // نستخدم المعرف ID كقيمة
          });
        } else {
          subSelect.innerHTML =
            '<option value="">Choose category first...</option>';
        }
      }

      document
        .getElementById("category_select")
        .addEventListener("change", function () {
          handleCategoryChange(this.value);
        });

      document
        .getElementById("editProductForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const formData = new FormData(this);

          // تأكد من إضافة الـ ID يدوياً لضمان وجوده
          const params = new URLSearchParams(window.location.search);
          const productId = params.get("id");
          formData.append("product_id", productId);

          submitProductUpdate(formData);
        });
    </script>
  </body>
</html>
