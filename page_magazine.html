<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="imges/img/fancy1.jfif" />
    <title>Fancy Design</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <style>
      /* تحسين المسافات لتطابق ستايل المجلة في الصفحة الرئيسية */
      #magazine-grid {
        gap: 40px;
        margin-top: 20px;
      }
      .load-more-container {
        text-align: center;
        margin: 50px 0;
      }
      .btn-load-more {
        background: #000;
        color: #fff;
        padding: 12px 40px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        font-size: 16px;
        transition: background 0.3s;
      }
      .btn-load-more:hover {
        background: #333;
      }
    </style>
    
    <div id="header-placeholder"></div>

    <section class="projects-section">
      <p class="title" style="padding-left: 50px;">Magazine</p>
      <div class="container" style="display: block;">
        <div id="magazine-grid" class="projects-grid"></div>
        <div id="load-more-container" class="load-more-container hidden">
          <button id="load-more-btn" class="btn-load-more">Load More</button>
        </div>
      </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="js/script.js"></script>
    <script src="js/brands.js"></script>
    <script src="js/auth.js"></script>
    <script>
      let allProjects = [];
      let displayedCount = 0;
      const limit = 6;

      async function loadAllMagazines() {
        const container = document.getElementById("magazine-grid");
        const loadMoreBtn = document.getElementById("load-more-btn");

        if (!container) return;
        try {
          // جلب المشاريع العامة من الـ API
          const result = await FancyAPI.get('/project/public_projects.php');
          if (result.success && result.data && result.data.projects) {
            allProjects = result.data.projects;
            
            if (allProjects.length === 0) {
              container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 50px;">No magazine entries published yet.</p>';
              return;
            }

            renderNextBatch();
            loadMoreBtn.onclick = renderNextBatch;
          }
        } catch (error) {
          console.error("Error loading magazines:", error);
        }
      }

      function renderNextBatch() {
        const container = document.getElementById("magazine-grid");
        const loadMoreWrapper = document.getElementById("load-more-container");
        
        const nextBatch = allProjects.slice(displayedCount, displayedCount + limit);
        const html = nextBatch.map(p => createGenericCardHTML({
          id: p.id,
          title: p.title,
          image: getSafeImageUrl(p.cover_image),
          category: p.category,
          type: p.type
        }, 'magazine')).join('');
        
        container.insertAdjacentHTML('beforeend', html);
        displayedCount += nextBatch.length;

        if (displayedCount >= allProjects.length) {
          loadMoreWrapper.classList.add('hidden');
        } else {
          loadMoreWrapper.classList.remove('hidden');
        }
      }

      // دالة إنشاء الكروت بنفس مقاسات الصفحة الرئيسية (عريضة وفخمة)
      function createGenericCardHTML(data, type) {
        let targetPage = "view_magazine.html";
        const itemId = data.product_id || data.id || "";

        return `
        <div class="magazine-card">
            <div class="card-image">
                <a href="${targetPage}?id=${itemId}">
                    <img src="${data.image}" alt="${data.title}">
                </a>
            </div>
            <div class="card-content">
                <a href="${targetPage}?id=${itemId}" style="text-decoration: none; color: inherit;">
                    <h3 class="card-title" style="font-size: 24px; font-weight: 500; margin-bottom: 15px; min-height: 68px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${data.title}</h3>
                </a>
                <div class="card-meta" style="display: flex; flex-direction: column; gap: 8px; border-top: 1px solid #eee; margin-top: 10px; padding-top: 15px;">
                    <p style="font-size: 13px; color: #888; margin: 0;  letter-spacing: 1px;">
                   ${data.category || 'N/A'}
                    </p>
                    <p style="font-size: 13px; color: #888; margin: 0;  letter-spacing: 1px;">
                        ${data.type || 'N/A'}
                    </p>
                </div>
            </div>
        </div>`;
      }

      window.addEventListener("load", loadAllMagazines);
    </script>
  </body>
</html>
