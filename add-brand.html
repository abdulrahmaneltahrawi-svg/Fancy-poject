<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل براند جديد - Fancy Design</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-container { max-width: 700px; margin: 50px auto; padding: 30px; border: 1px solid #ddd; border-radius: 12px; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-header { text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
        .submit-btn { background: #ffb400; color: #000; padding: 15px 25px; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-size: 17px; font-weight: bold; transition: background 0.3s; }
        .submit-btn:hover { background: #e5a200; }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="form-container">
        <div class="form-header">
            <h2>تسجيل علامة تجارية جديدة</h2>
            <p>أدخل تفاصيل البراند الخاص بك ليتم مراجعته من قبل الإدارة</p>
        </div>
        <form id="brandForm">
            <div class="form-group">
                <label>اسم العلامة التجارية</label>
                <input type="text" name="brand_name" required placeholder="اكتب اسم العلامة التجارية هنا...">
            </div>
            <div class="form-group">
                <label>نوع المنتج (القسم)</label>
                <select name="brand_type" id="brand_type_select" required>
                    <option value="">جاري تحميل الأقسام...</option>
                </select>
            </div>
            <div style="display: flex; gap: 35px;">
                <div class="form-group" style="flex: 1;">
                    <label>الدولة</label>
                    <input type="text" name="country" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>المدينة</label>
                    <input type="text" name="city">
                </div>
            </div>
            <div class="form-group">
                <label>البريد الإلكتروني للعلامة التجارية</label>
                <input type="email" name="email" placeholder="brand@example.com">
            </div>
            <div class="form-group">
                <label>رقم الهاتف للعلامة التجارية</label>
                <input type="tel" name="phone" placeholder="مثلاً: 05XXXXXXXX">
            </div>
            <div class="form-group">
                <label>شعار العلامة التجارية (Logo)</label>
                <input type="file" name="logo" accept="image/*">
            </div>
            <div class="form-group">
                <label>صورة الغلاف (Cover Image)</label>
                <input type="file" name="cover_image" accept="image/*">
            </div>
            <div class="form-group">
                <label>رابط الموقع الإلكتروني (إن وجد)</label>
                <input type="url" name="website" placeholder="https://example.com">
            </div>
            <div class="form-group">
                <label>وصف عن العلامة التجارية</label>
                <textarea name="description" rows="4"></textarea>
            </div>
            <button type="submit" class="submit-btn">إرسال الطلب</button>
        </form>
    </div>

    <div id="footer-placeholder"></div>

    <script src="js/script.js"></script>
    <script src="js/brands.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // دالة لجلب الأقسام من قاعدة البيانات وتعبئة القائمة المنسدلة
        async function loadCategoriesToSelect() {
            const selectElem = document.getElementById('brand_type_select');
            try {
                // استدعاء ملف الأقسام (تم استخدام المسار القياسي المتبع في المشروع)
                const result = await FancyAPI.get('/categories/list.php');
                if (result.success && result.data && result.data.categories) {
                    selectElem.innerHTML = '<option value="">اختر نوع المنتج...</option>';
                    result.data.categories.forEach(cat => {
                        const option = document.createElement('option');
                        option.value = cat.name; // نرسل اسم القسم كنوع للنشاط
                        option.textContent = cat.name;
                        selectElem.appendChild(option);
                    });
                } else {
                    selectElem.innerHTML = '<option value="">لا توجد أقسام متوفرة</option>';
                }
            } catch (error) {
                console.error('Error loading categories:', error);
                selectElem.innerHTML = '<option value="">خطأ في تحميل الأقسام</option>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadCategoriesToSelect);

        document.getElementById('brandForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this); // إرسال FormData مباشرة لدعم الصور
            submitNewBrand(formData);
        });
    </script>
</body>
</html>
