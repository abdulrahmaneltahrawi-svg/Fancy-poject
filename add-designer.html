<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>الانضمام كمصمم - Fancy Design</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-container { max-width: 700px; margin: 50px auto; padding: 30px; border: 1px solid #ddd; border-radius: 12px; background: #fff; }
        .form-header { text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; }
        .submit-btn { background: #000; color: #fff; padding: 15px; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="form-container">
        <div class="form-header">
            <h2>تفعيل ملف المصمم</h2>
            <p>أبرز مهاراتك وأعمالك لعملائنا</p>
        </div>
        <form id="designerForm">
            <div class="form-group">
                <label>الاسم المهني / الكامل</label>
                <input type="text" name="name" required placeholder="مثلاً: م. أحمد علي">
            </div>
            <div class="form-group">
                <label>التخصص</label>
                <input type="text" name="specialization" placeholder="مثلاً: تصميم داخلي، هندسة معمارية">
            </div>
            <div class="form-group">
                <label>رابط معرض الأعمال (Portfolio)</label>
                <input type="url" name="portfolio_url" placeholder="Behance, LinkedIn, or Website">
            </div>
            <div class="form-group">
                <label>نبذة تعريفية</label>
                <textarea name="bio" rows="5" placeholder="اكتب نبذة قصيرة عن خبراتك وأسلوبك في التصميم"></textarea>
            </div>
            <button type="submit" class="submit-btn">حفظ وتفعيل الملف</button>
        </form>
    </div>

    <div id="footer-placeholder"></div>

<script src="js/script.js"></script>
<script src="js/designers.js"></script>

<script>
    document.getElementById('designerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // التحقق من وجود الدالة قبل استدعائها
        if (typeof submitDesignerProfile === 'function') {
            const data = Object.fromEntries(new FormData(this).entries());
            submitDesignerProfile(data);
        } else {
            console.error("خطأ: الدالة submitDesignerProfile غير معرفة!");
        }
    });
</script>
</body>
</html>
