<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="imges/img/fancy1.jfif" />
    <title>Add New Designer - Fancy Design</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .form-container {
        max-width: 600px;
        margin: 50px auto;
        padding: 50px;
        border: 1px solid #ddd;
        border-radius: 8px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      .form-group input,
      .form-group textarea,
      .form-group select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .submit-btn {
        background: #000;
        color: #fff;
        padding: 12px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="header-placeholder"></div>
    <div class="form-container">
      <h2>Add new designer</h2>
      <form id="designerForm">
        <div class="form-group">
          <label>Designer name</label>
          <input
            type="text"
            placeholder="Your designer name here..."
            name="designer_name"
            required
          />

        </div>
        <div class="form-group">
          <label>Designer type</label>
          <input
            type="text"
            placeholder="Your design type here..."
            name="company_type"
            required
          />
        </div>
                 <div class="form-group" style="flex: 1">
            <label>City</label>
            <input type="text" name="city" required />
          </div>
          <div class="form-group" style="flex: 1">
            <label>Country</label>
            <input type="text" name="country" />
          </div>
          <div class="form-group" style="flex: 1">
            <label>Services</label>
            <input type="text" name="services" />
          </div>
          
        <div class="form-group">
          <label>Designer logo</label>
          <input type="file" name="avatar" accept="image/*" required />
        </div>
        <div class="form-group">
          <label>Instagram</label>
          <input type="text" name="instagram_url" placeholder="Instagram username" />
        </div>
        <div class="form-group">
          <label>LinkedIn</label>
          <input type="text" name="linkedin_url" placeholder="LinkedIn profile link" />
        </div>
        <div class="form-group">
          <label>WhatsApp</label>
          <input type="tel" name="whatsapp_number" placeholder="WhatsApp number" />
        </div>
        <div class="form-group">
          <label>Email:</label>
          <input type="email" name="email_contact" placeholder="designer@example.com" />
        </div>
        <div class="form-group">
          <label>About Designer:</label>
          <textarea name="bio" rows="5"></textarea>
        </div>
        <button type="submit" class="submit-btn">
          Send designer for review
        </button>
      </form>
    </div>
    <script src="js/script.js"></script>
    <script src="js/designers.js"></script>
    <script src="js/auth.js"></script>
    <script>
      document.getElementById('designerForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const formData = new FormData(this);
        
        // تحويل نص الخدمات إلى مصفوفة JSON كما يتوقع ملف PHP
        const servicesValue = formData.get('services');
        const servicesArray = servicesValue ? servicesValue.split(',').map(s => s.trim()).filter(s => s !== "") : [];
        formData.set('services', JSON.stringify(servicesArray));

        const submitBtn = this.querySelector('.submit-btn');
        const originalText = submitBtn.innerText;

        submitBtn.disabled = true;
        submitBtn.innerText = 'Sending...';

        // استخدام الدالة الموحدة لضمان معالجة صحيحة
        await submitNewDesigner(formData);

        submitBtn.disabled = false;
        submitBtn.innerText = originalText;
      });
    </script>
  </body>
</html>
