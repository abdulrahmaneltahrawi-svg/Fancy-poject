<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="imges/img/fancy1.jfif" />
    <title>Fancy Design - Brands</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <style>
      .side-imgs {
        display: grid;
        grid-template-rows: 1fr 1fr;
        gap: 2px;
      }

      .single-layout {
        grid-template-columns: 1fr;
      }

      .brand-info {
        display: flex;
        align-items: center;
        margin-top: 15px;
        gap: 12px;
      }

      .brand-logo {
        width: 40px;
        height: 40px;
        border-radius: 4px;
        object-fit: contain;
      }

      .brand-text h3 {
        font-size: 16px;
        font-weight: 700;
        margin: 0;
        color: #111;
        text-transform: capitalize;
      }

      .brand-text p {
        font-size: 12px;
        color: #888;
        margin: 2px 0;
      }

      .brand-text span {
        font-size: 11px;
        color: #aaa;
        display: block;
      }
    </style>
    <div id="header-placeholder"></div>

    <div class="filter-container">
      <div class="dropdown">
        <button class="dropbtn" id="country-filter-btn" data-original-text="Country">
          Country <i class="arrow down"></i>
        </button>
        <div class="dropdown-content" id="country-filter-content">
          <input type="text" placeholder="Search Country" class="search-input" />
        </div>
      </div>

      <div class="dropdown">
        <button class="dropbtn" id="category-filter-btn" data-original-text="Category">
          Category <i class="arrow down"></i>
        </button>
        <div class="dropdown-content" id="category-filter-content">
          <input type="text" placeholder="Search Category" class="search-input" />
        </div>
      </div>

      <button class="clear-filters-btn" id="clear-all">Clear All</button>
    </div>

    <div id="brands-container" class="brands-container" style="margin: 0;"></div>

    <div id="footer-placeholder"></div>

    <script src="js/script.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/brands.js"></script>
    <script>
      var allBrandsData = [];
      var filterCountry = null;
      var filterCategory = null;

      function showBrands(brands) {
        var container = document.getElementById('brands-container');
        if (!container) return;
        if (!brands || brands.length === 0) {
          container.innerHTML = '<p style="text-align: center; grid-column: 1/-1; padding: 50px;">No brands match your filters.</p>';
          return;
        }
        container.innerHTML = '';
        for (var i = 0; i < brands.length; i++) {
          var b = brands[i];
          var hasSide = b.side_img1 || b.side_img2;
          var cls = hasSide ? '' : 'single-layout';
          var id = b.id || b.brand_id || '';
          var name = b.brand_name || b.name || 'Brand';
          var img = getSafeImageUrl(b.cover_image || b.main_image);
          var logo = getSafeImageUrl(b.logo);
          var country = b.country || '';
          var city = b.city || '';
          var type = b.brand_type || '';

          var html = '<div class="brand-card">' +
            '<a href="view_brands.html?brand=' + id + '" style="text-decoration: none; color: inherit;">' +
            '<div class="brand-images-grid ' + cls + '">' +
            '<div class="main-img"><img src="' + img + '" alt="' + name + '" /></div>';
          if (hasSide) {
            html += '<div class="side-imgs">';
            if (b.side_img1) html += '<img src="' + getSafeImageUrl(b.side_img1) + '" alt="" />';
            if (b.side_img2) html += '<img src="' + getSafeImageUrl(b.side_img2) + '" alt="" />';
            html += '</div>';
          }
          html += '</div>' +
            '<div class="brand-info" style="padding: 10px;">' +
            '<img src="' + logo + '" alt="logo" class="brand-logo" />' +
            '<div class="brand-text">' +
            '<h3>' + name + '</h3>' +
            '<p>' + country + ' | ' + city + '</p>' +
            '<span>' + type + '</span>' +
            '</div></div></a></div>';
          container.insertAdjacentHTML('beforeend', html);
        }
      }

      function doFilter() {
        var filtered = [];
        for (var i = 0; i < allBrandsData.length; i++) {
          var b = allBrandsData[i];
          var match = true;
          if (filterCountry) {
            var c = (b.country || '').toLowerCase();
            if (c.indexOf(filterCountry.toLowerCase()) === -1) match = false;
          }
          if (filterCategory && match) {
            var t = (b.brand_type || '').toLowerCase();
            if (t.indexOf(filterCategory.toLowerCase()) === -1) match = false;
          }
          if (match) filtered.push(b);
        }
        showBrands(filtered);
      }

      function addOpt(id, txt, fn) {
        var el = document.getElementById(id);
        if (!el) return;
        var a = document.createElement('a');
        a.href = '#';
        a.textContent = txt;
        a.onclick = fn;
        el.appendChild(a);
      }

      document.addEventListener("DOMContentLoaded", async function() {
        try {
          var res = await FancyAPI.get('/brands/public-list.php');
          if (res.success && res.data && res.data.brands) {
            allBrandsData = res.data.brands;
            if (allBrandsData.length > 0) {
              showBrands(allBrandsData);
            } else {
              document.getElementById('brands-container').innerHTML = '<p style="text-align: center; grid-column: 1/-1; padding: 50px;">No brands found.</p>';
            }
          } else {
            document.getElementById('brands-container').innerHTML = '<p style="text-align: center; grid-column: 1/-1; padding: 50px;">No brands found.</p>';
          }
        } catch (e) {
          console.error(e);
        }

        var countries = [
          "All Countries", "Saudi Arabia", "United Arab Emirates", "Egypt", "Jordan",
          "Kuwait", "Oman", "Qatar", "Bahrain", "Lebanon", "Turkey", "Morocco",
          "USA", "Canada", "United Kingdom", "France", "Germany", "Spain",
          "Italy", "Netherlands", "Switzerland", "Sweden", "Norway", "Denmark",
          "China", "Japan", "South Korea", "India", "Australia", "Brazil"
        ];

        for (var i = 0; i < countries.length; i++) {
          var c = countries[i];
          addOpt('country-filter-content', c, (function(country) {
            return function(e) {
              e.preventDefault();
              if (country === "All Countries") {
                document.getElementById('country-filter-btn').innerHTML = 'Country <i class="arrow down"></i>';
                filterCountry = null;
              } else {
                document.getElementById('country-filter-btn').innerHTML = country + ' <i class="arrow down"></i>';
                filterCountry = country;
              }
              doFilter();
            };
          })(c));
        }

        try {
          var catRes = await FancyAPI.get('/categories/list.php');
          if (catRes.success && catRes.data && catRes.data.categories) {
            addOpt('category-filter-content', 'All Categories', function(e) {
              e.preventDefault();
              document.getElementById('category-filter-btn').innerHTML = 'Category <i class="arrow down"></i>';
              filterCategory = null;
              doFilter();
            });
            for (var j = 0; j < catRes.data.categories.length; j++) {
              var cat = catRes.data.categories[j];
              addOpt('category-filter-content', cat.name, (function(catName) {
                return function(e) {
                  e.preventDefault();
                  document.getElementById('category-filter-btn').innerHTML = catName + ' <i class="arrow down"></i>';
                  filterCategory = catName;
                  doFilter();
                };
              })(cat.name));
            }
          }
        } catch (e) {
          console.error(e);
        }

        document.getElementById('clear-all').onclick = function() {
          filterCountry = null;
          filterCategory = null;
          document.getElementById('country-filter-btn').innerHTML = 'Country <i class="arrow down"></i>';
          document.getElementById('category-filter-btn').innerHTML = 'Category <i class="arrow down"></i>';
          doFilter();
        };

        document.querySelectorAll('.dropdown-content .search-input').forEach(function(inp) {
          inp.oninput = function() {
            var v = this.value.toLowerCase();
            var links = this.parentElement.querySelectorAll('a');
            links.forEach(function(l) {
              l.style.display = l.textContent.toLowerCase().indexOf(v) !== -1 ? '' : 'none';
            });
          };
        });
      });
    </script>
  </body>
</html>
