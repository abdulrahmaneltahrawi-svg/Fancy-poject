  <body>
    <style>
      /* الحاوية الكبرى */
      .brands-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 40px; /* مسافات واسعة بين البراندات */
        padding: 40px;
        background-color: #fff;
      }

      /* بطاقة البراند */
      .brand-card {
        display: flex;
        flex-direction: column;
      }

      /* شبكة الصور داخل البطاقة */
      .brand-images-grid {
        display: grid;
        grid-template-columns: 2fr 1fr; /* الصورة الكبيرة تأخذ مساحة أكبر */
        gap: 2px; /* فواصل رقيقة جداً بين الصور */
        height: 300px;
        background-color: #f9f9f9;
        overflow: hidden;
      }

      .brand-images-grid img {
        width: 100%;
        height: 100%;
        object-fit: cover; /* لضمان عدم تشوه الصور */
      }

      /* تنسيق الصور الجانبية */
      .side-imgs {
        display: grid;
        grid-template-rows: 1fr 1fr;
        gap: 2px;
      }

      /* حالة الصورة الواحدة الكبيرة (مثل الكرسي في الصورة) */
      .single-layout {
        grid-template-columns: 1fr;
      }

      /* منطقة المعلومات أسفل الصور */
      .brand-info {
        display: flex;
        align-items: center;
        margin-top: 15px;
        gap: 12px;
      }

      .brand-logo {
        width: 40px;
        height: 40px;
        border-radius: 4px;
        object-fit: contain;
      }

      .brand-text h3 {
        font-size: 16px;
        font-weight: 700;
        margin: 0;
        color: #111;
        text-transform: capitalize;
      }

      .brand-text p {
        font-size: 12px;
        color: #888;
        margin: 2px 0;
      }

      .brand-text span {
        font-size: 11px;
        color: #aaa;
        display: block;
      }
    </style>
