<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="imges/img/fancy1.jfif" />
    <title>Fancy Design</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <style>

   

      /* تنسيق الصور الجانبية */
      .side-imgs {
        display: grid;
        grid-template-rows: 1fr 1fr;
        gap: 2px;
      }

      /* حالة الصورة الواحدة الكبيرة (مثل الكرسي في الصورة) */
      .single-layout {
        grid-template-columns: 1fr;
      }

      /* منطقة المعلومات أسفل الصور */
      .brand-info {
        display: flex;
        align-items: center;
        margin-top: 15px;
        gap: 12px;
      }

      .brand-logo {
        width: 40px;
        height: 40px;
        border-radius: 4px;
        object-fit: contain;
      }

      .brand-text h3 {
        font-size: 16px;
        font-weight: 700;
        margin: 0;
        color: #111;
        text-transform: capitalize;
      }

      .brand-text p {
        font-size: 12px;
        color: #888;
        margin: 2px 0;
      }

      .brand-text span {
        font-size: 11px;
        color: #aaa;
        display: block;
      }
    </style>
    <div id="header-placeholder"></div>

    <div id="brands-container" class="brands-container">
      <!-- سيتم تحميل البراندات هنا تلقائياً -->
    </div>

    <div id="footer-placeholder"></div>

    <script src="js/script.js"></script>
    <script src="js/brands.js"></script>
    <script src="js/auth.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (typeof displayAllBrands === "function") {
          displayAllBrands();
        }
      });
    </script>
  </body>
</html>
