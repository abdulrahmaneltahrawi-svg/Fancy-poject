<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="imges/img/fancy1.jfif" />
    <title>Brand View</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: sans-serif;
        background-color: white;
      }
      .brand-header {
        background: #fff;
        padding: 40px 0;
      }
      .cover-photo {
        height: 500px;
        width: 100%;
        overflow: hidden;
      }
      .cover-photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .brand-profile-bar {
        padding: 0 5%;
        position: relative;
        display: flex;
        align-items: flex-start;
        gap: 30px;
        max-width: 1400px;
        margin: 0 auto;
      }
      .brand-logo-container {
        width: 200px;
        height: 200px;
        background: #fff;
        border-radius: 50%;
        padding: 5px;
        border:  1px solid #d3d2d2;
        margin-right: 20px;
        flex-shrink: 0;
      }
      .brand-logo-container img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: contain;
      }
      .brand-main-info {
        flex-grow: 1;
      }
      .brand-actions {
        padding-bottom: 30px;
        display: flex;
        gap: 10px;
      }
      .btn {
        padding: 10px 20px;
        text-decoration: none;
        border-radius: 5px;
        font-size: 14px;
        cursor: pointer;
      }
      .btn-black {
        background: #000;
        color: #fff;
      }
      .btn-edit {
        background: #eee;
        color: #000;
        border: 1px solid #ccc;
      }
      .hidden {
        display: none !important;
      }
    

      @media (max-width: 768px) {
        .container-flex {
          flex-direction: column;
          align-items: center;
        }
      }

      .projects-grid {
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); /* Adjust card width for better fit */
      }

      /* تنسيق أيقونات التواصل الاجتماعي */
      .social-links {
        display: flex;
        gap: 15px;
        margin-top: 15px;
      }
      .social-icon {
        width: 35px;
        height: 35px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: #f8f8f8;
        border: 1px solid #eee;
        transition: all 0.3s ease;
      }
      .social-icon:hover {
        background: #000;
      }
      .social-icon img {
        width: 35px;
        height: 35px;
        object-fit: contain;
      }
      .social-icon:hover img {
        filter: brightness(0) invert(1);
      }

      /* تنسيق قائمة الخدمات */
      .services-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 15px;
      }
      .service-tag {
        background: #f0f0f0;
        color: #555;
        padding: 6px 15px;
        border-radius: 4px;
        font-size: 13px;
        font-weight: 500;
        border: 1px solid #eee;
      }

      
    </style>
  </head>
  <body>
    <div id="header-placeholder"></div>

    <section class="brand-header">
      <div class="brand-profile-bar">
        <!-- Removed container-flex wrapper here, brand-profile-bar is now the flex container -->
          <div class="brand-logo-container">
            <img id="brandLogo" src="" alt="Logo" />
          </div>
          <div class="brand-main-info">
            <h1 id="brandName">...</h1>
            <p id="brandLocation"></p>
            
            <!-- حاوية أيقونات التواصل الاجتماعي -->
            <div class="social-links" id="designerSocial">
              <a id="link-whatsapp" href="#" target="_blank" class="social-icon hidden" title="WhatsApp">
                <img src="imges/icons/whatsapp.png" alt="WhatsApp">
              </a>
              <a id="link-instagram" href="#" target="_blank" class="social-icon hidden" title="Instagram">
                <img src="imges/icons/instagram.png" alt="Instagram">
              </a>
              <a id="link-linkedin" href="#" target="_blank" class="social-icon hidden" title="LinkedIn">
                <img src="imges/icons/linkedin.png" alt="LinkedIn">
              </a>
              <a id="link-email" href="#" class="social-icon hidden" title="Email">
                <img src="imges/icons/email.png" alt="Email">
              </a>
              <a id="link-website" href="#" target="_blank" class="social-icon hidden" title="Website">
                <img src="imges/icons/website.png" alt="Website">
              </a>
            </div>

            <!-- حاوية الخدمات -->
            <h4 id="servicesTitle" class="hidden" style="margin-top: 25px; margin-bottom: 5px; font-size: 15px; color: #333; font-weight: 600;">Services</h4>
            <div class="services-list" id="designerServices"></div>
          </div>
          <div class="brand-actions">
            <a href="#" id="edit-brand-btn" class="btn btn-edit hidden"
              >Edit Brand</a
            >
            <a href="add-magazine.html" id="add-product-btn" class="btn btn-black hidden"
              >Add new Magazine +</a
            >
          </div> <!-- End of brand-actions -->
      </div>
    </section>

    <main class="brand-content">
      <section>
        <p class="title">About</p>
        <p
          id="brandAbout"
          style=" /* Adjust margin-left to align with the new centered layout */
            max-width: 1360px;
            line-height: 2.0;
            margin-top: 20px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            margin-left: auto; /* Center the about section */
            margin-right: auto;
          "
        ></p>
      </section>

      <section class="products-section">
        <div class="container-p">
            <p class="title">Magazine</p>
          <div class="projects-grid" id="productsGrid">
            <!-- سيتم تحميل المنتجات هنا تلقائياً -->
          </div>
        </div>
      </section>
    </main>

    <script src="js/script.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/products.js"></script>
    <script src="js/brands.js"></script>
    <script>
      async function loadBrandPage() {
        const urlParams = new URLSearchParams(window.location.search);
        const brandId = urlParams.get("brand") || urlParams.get("id");

        if (!brandId) return;

        try {
          // استدعاء بيانات المصمم بدلاً من البراند
          const result = await FancyAPI.get(`/designer/get_profile.php?id=${brandId}`);

          if (result.success && result.data) {
            const designer = result.data.designer || result.data;
            
            document.getElementById("brandName").innerText = designer.designer_name || designer.company_type || "Designer";
            document.getElementById("brandAbout").innerText = designer.bio || designer.description || "No description available.";
            document.getElementById("brandLocation").innerText = `${designer.city || ''}, ${designer.country || ''}`;
            
            // تحديث الصورة
            document.getElementById("brandLogo").src = getSafeImageUrl(designer.avatar || designer.logo || "imges/img/fancy1.jfif");

            // تحديث روابط التواصل الاجتماعي من قاعدة البيانات
            const socials = {
                whatsapp: { id: 'link-whatsapp', value: designer.whatsapp_number, url: (v) => `https://wa.me/${v.replace(/\s+/g, '')}` },
                instagram: { id: 'link-instagram', value: designer.instagram_url, url: (v) => v.startsWith('http') ? v : `https://instagram.com/${v}` },
                linkedin: { id: 'link-linkedin', value: designer.linkedin_url, url: (v) => v.startsWith('http') ? v : `https://linkedin.com/in/${v}` },
                email: { id: 'link-email', value: designer.email_contact, url: (v) => `mailto:${v}` },
                website: { id: 'link-website', value: designer.website_url, url: (v) => v.startsWith('http') ? v : `https://${v}` }
            };

            for (const key in socials) {
                const item = socials[key];
                const el = document.getElementById(item.id);
                if (item.value && item.value !== "" && item.value !== "null" && el) {
                    el.href = item.url(item.value);
                    el.classList.remove('hidden');
                }
            }

            // تحديث الخدمات (Services)
            const servicesContainer = document.getElementById("designerServices");
            if (servicesContainer && designer.services) {
                // التأكد من معالجة البيانات سواء كانت مصفوفة نصوص أو كائنات
                const servicesArray = Array.isArray(designer.services) ? designer.services : [];
                if (servicesArray.length > 0) {
                    document.getElementById("servicesTitle")?.classList.remove("hidden");
                    servicesContainer.innerHTML = servicesArray.map(service => {
                        const serviceName = typeof service === 'object' ? (service.name || service.service_name) : service;
                        return `<span class="service-tag">${serviceName}</span>`;
                    }).join('');
                }
            }

            // التحقق من الملكية لإظهار الأزرار
            const userData = JSON.parse(localStorage.getItem("userData") || "{}");
            const isOwner = userData && userData.id == designer.user_id;
            if (isOwner) {
                // زر التعديل
                const editBtn = document.getElementById("edit-brand-btn");
                editBtn.classList.remove("hidden");
                editBtn.innerText = "Edit Designer Profile";
                editBtn.href = `edit-designer.html?id=${designer.id}`;

                // زر إضافة منتج
                const addProductBtn = document.getElementById("add-product-btn");
                addProductBtn.classList.remove("hidden");
                addProductBtn.href = `add-magazine.html`;
            }

            // جلب المشاريع/المقالات الخاصة بهذا المصمم (Magazine Entries)
            loadDesignerProjects(designer.id, isOwner);

          } else {
            alert("Designer profile not found.");
            window.location.href = "index.html";
          }
        } catch (error) {
          console.error(error);
        }
      }
      async function loadDesignerProjects(designerId, isOwner = false) {
        const grid = document.getElementById("productsGrid");
        try {
            // جلب المشاريع العامة
            const result = await FancyAPI.get(`/project/public_projects.php`);
            if (result.success && result.data) {
                let projects = result.data.projects || result.data;
                
                // الفلترة لضمان ظهور المجلات التي تنتمي لهذا المصمم فقط بناءً على الـ ID
                projects = projects.filter(p => p.designer_id == designerId);

                if (projects.length === 0) {
                    grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center; color: #999;'>No magazine entries published yet.</p>";
                    return;
                }

                grid.innerHTML = projects.map(project => `
                    <div class="magazine-card">
                        <div class="card-image">
                            <a href="view_magazine.html?id=${project.id}">
                                <img src="${getSafeImageUrl(project.cover_image)}" alt="${project.title}">
                            </a>
                        </div>
                        <div class="card-content" style="display: flex; flex-direction: column; flex-grow: 1;">
                            <a href="view_magazine.html?id=${project.id}" style="text-decoration: none; color: inherit;">
                                <h3 class="card-title" style="min-height: 48px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 10px; font-size: 17px; font-weight: 600;">${project.title}</h3>
                            </a>
                            <div style="margin-top: auto; border-top: 1px solid #eee; padding-top: 10px;">
                                <p class="card-category" style="font-size: 12px; color: #999; margin: 0; text-transform: uppercase; letter-spacing: 0.5px;">${project.category || 'N/A'}</p>
                                <p class="card-type" style="font-size: 12px; color: #999; margin: 2px 0 0 0;">${project.type || 'N/A'}</p>
                            </div>
                            ${isOwner ? `
                            <div class="card-actions" style="margin-top: 15px;">
                                <a href="edit-magazine.html?id=${project.id}" class="btn btn-edit" style="display: block; text-align: center; width: 100%; padding: 5px 0; background: #f0f0f0; color: #000; font-size: 12px; font-weight: bold; border-radius: 4px;">Edit Project</a>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                `).join('');
            }
        } catch (error) {
            console.error("Error loading projects:", error);
            grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center; color: red;'>Failed to load magazine entries.</p>";
        }
      }

      window.addEventListener("load", loadBrandPage);
    </script>
  </body>
</html>
