    <style>
      .second-header {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 270px;
        margin-top: 30px;
      }

      .publish{
        color: black;

      .category-nav {
        display: flex;
        justify-content: center; /* لتوسيط القائمة في الصفحة */
        gap: 30px; /* المسافة بين الكلمات */
       
        
        font-family: Arial, sans-serif; /* نوع الخط القريب من الصورة */
      }

      .category-nav a {
        text-decoration: none; /* إزالة الخط اللي تحت الرابط */
        color: #333; /* لون الخط */
        font-size: 18px; /* حجم الخط */
        font-weight: 400; /* سمك الخط */
        transition: color 0.3s ease;
      }

      /* تأثير بسيط عند تمرير الماوس */
      .category-nav a:hover {
        color: gray;
      }

      .hero-slider {
        position: relative;
        width: 90%; /* يمكنك تقليل النسبة حسب الرغبة، مثلاً 80% */
        max-width: 1100px; /* يمنع السلايدر من التمدد بشكل مفرط في الشاشات الكبيرة جداً */
        height: 60vh; /* يمكنك أيضاً تقليل الارتفاع ليناسب العرض الجديد */
        margin: 20px auto; /* auto تقوم بتوسيط السلايدر في المنتصف أفقياً */
        border-radius: 15px; /* اختيارياً: إضافة زوايا منحنية تعطي شكلاً عصرياً */
        overflow: hidden;
      }

      .slider-container {
        width: 100%;
        height: 100%;
      }

      .slider-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;      /* هذا هو الحل الأساسي لمشكلة القص */
    object-position: center; /* لضمان تركيز الصورة في المنتصف دائماً */
    flex-shrink: 0;         /* لمنع انضغاط الصور */
}

      .slide {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: opacity 0.8s ease-in-out, visibility 0.8s;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .slide.active {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      .slide-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        z-index: -1;
      }

      /* طبقة تعتيم خفيفة لتحسين رؤية النص */
      .slide-bg::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.1);
      }

      .slide-content {
        color: #fff;
        max-width: 800px;
        padding: 20px;
      }

      .slide-content h1 {
        font-size: 4rem;
        margin-bottom: 10px;
        letter-spacing: 2px;
      }

      .slide-content p {
        font-size: 1.2rem;
        font-weight: 300;
      }

      /* أزرار التحكم */
      .prev-btn,
      .next-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(255, 255, 255, 0.3);
        color: white;
        border: none;
        padding: 12px 20px;
        cursor: pointer;
        font-size: 20px;
        border-radius: 60%;
      }

      .prev-btn {
        left: 20px;
      }
      .next-btn {
        right: 20px;
      }

      .prev-btn:hover,
      .next-btn:hover {
        background: rgba(255, 255, 255, 0.6);
      }

      /* النقاط */
      .dots-container {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
      }

      .dot {
        width: 10px;
        height: 10px;
        background: rgba(255, 255, 255, 0.5);
        border-radius: 50%;
        cursor: pointer;
      }

      .dot.active {
        background: #fff;
      }

      /* تحسين استجابة قائمة الأقسام للموبايل */
      @media (max-width: 600px) {
        .category-nav {
          gap: 27px; /* تقليل المسافة بين الروابط */
          padding: 15px; /* تقليل الحشوة */
          flex-wrap: wrap; /* السماح للعناصر بالانتقال إلى سطر جديد */
          justify-content: flex-start; /* محاذاة العناصر إلى البداية عند الالتفاف */
          font-size: 5px;
        }
      }


      .descrition {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;

      }
      .des1{
        font-size: 20px;
        
      }
      .des2{
        font-size: 15px;
        color:rgb(173, 172, 172)
        
      }

      /* تنسيق السكشن الرئيسي */
    .gallery-section {
        max-width: 1200px;
        margin: 0 auto;
     
    }

    /* تنسيق الشبكة داخل السكشن */

    /* تنسيق الصور */

        box-shadow: 0 4px 6px rgba(0,0,0,0.1);

    /* تأثير بسيط عند التمرير بالفأرة */
    .gallery-item:hover {
        transform: scale(1.03);
    }

     .gallery-item img{

     }

    <script>
      // نترك هذه المتغيرات فارغة في البداية
      let slides = [];
      let dots = [];
      let currentSlide = 0;
      let slideInterval; // لحفظ معرف الـ Interval وتجنب تكراره

      function initSlider() {
        // 1. إعادة تعريف العناصر بعد إضافة الـ HTML ديناميكياً
        slides = document.querySelectorAll(".slide");
        dots = document.querySelectorAll(".dot");

        if (slides.length === 0) return;

        // 2. تفعيل الأزرار (إضافة المستمعات مرة واحدة فقط)
        document.querySelector(".next-btn").onclick = () => {
          currentSlide = (currentSlide + 1) % slides.length;
          showSlide(currentSlide);
        };

        document.querySelector(".prev-btn").onclick = () => {
          currentSlide = (currentSlide - 1 + slides.length) % slides.length;
          showSlide(currentSlide);
        };

        // 3. التنقل التلقائي
        if (slideInterval) clearInterval(slideInterval);
        slideInterval = setInterval(() => {
          currentSlide = (currentSlide + 1) % slides.length;
          showSlide(currentSlide);
        }, 5000);
      }

      function showSlide(index) {
        // نستخدم المتغيرات العامة التي تم تحديثها
        if (slides.length === 0) return;

        slides.forEach((slide) => slide.classList.remove("active"));
        dots.forEach((dot) => dot.classList.remove("active"));

        slides[index].classList.add("active");
        dots[index].classList.add("active");
        currentSlide = index;
      }
      // انشاء الكروت وعرضها
      // مراجع الحاويات الفريدة (تأكد أن هذه الـ IDs موجودة في الـ HTML)
      const interiorContainer = document.getElementById("interior-container");
      const productContainer = document.getElementById("product-container");
      const brandContainer = document.getElementById("brand-container");

      document.addEventListener("DOMContentLoaded", async () => {
        // 0. جلب وتشغيل السلايدر الديناميكي
        if (typeof loadSliderProducts === "function") {
          await loadSliderProducts();
        }

        // 1. جلب وعرض الأقسام من الـ API
        if (typeof loadMainCategories === "function") {
          loadMainCategories("main-category-nav");
        }

        // 1. جلب وعرض المقالات من الـ API (أول 3 مقالات للمجلة)
        if (typeof loadMagazines === "function") {
          loadMagazines("interior-container", 3);
        }

        // 2. جلب وعرض المنتجات من الـ API (أول 6 منتجات)
        loadProducts("product-container", 6);

        // 3. جلب وعرض المصممين/البراندات من الـ API (أول 6 براندات)
        if (typeof displayAllBrands === "function") {
          displayAllBrands("brand-container", 6);
        }
      });

      // دالة التصميم الموحدة للعناصر غير المنتجات (Magazine, Brand)
      function createGenericCardHTML(data, type) {
        let targetPage = "view.html"; // الصفحة الافتراضية للمنتجات

        if (type === "magazine") {
          targetPage = "view_interior.html";
        } else if (type === "brand") {
          // توجيه العلامات التجارية لصفحتها الصحيحة
          targetPage = "view_brands.html";
        }

        // توحيد الأولوية لـ product_id لضمان عدم تكرار المعرفات كما في slider.js و products.js
        const itemId = data.product_id || data.id || "";
        const categoryText = data.category || "";
        const badgeText = data.type || data.tag || data.brand || "";

        return `
        <div class="project-card">
            <div class="card-image">
                <a href="${targetPage}?id=${itemId}">
                    <img src="${data.image}" alt="${data.title}">
                </a>
            </div>
            <div class="card-content">
                <a href="${targetPage}?id=${itemId}" style="text-decoration: none; color: inherit;">
                    <h3 class="card-title">${data.title}</h3>
                </a>
                
                <p class="card-description"  style="font-size: 14px; color: #666; margin: 10px 0;">
                    ${categoryText}
                </p>
                ${badgeText ? `<span class="category" style=" color: gray; text-transform: uppercase; font-size: 12px;">${badgeText}</span>` : ""}
            </div>
        </div>
    `;
      }

      // جعل الدالة متاحة لملف magazines.js
      window.createGenericCardHTML = createGenericCardHTML;
    </script>
