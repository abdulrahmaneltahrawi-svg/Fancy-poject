    <body>

        </div>

        <div class="dropdown">
          <button class="dropbtn" data-original-text="Materials">Materials<i class="arrow down"></i></button>
          <div class="dropdown-content">
            <input
              type="text"
              placeholder="Type to filter"
              class="search-input"
            />
            <a href="#" class="all-option">All Materials</a>
            <a href="#">Fabric</a>
            <a href="#">Velvet</a>

            <a href="#">Polyester</a>

        <div class="dropdown">
          <button class="dropbtn" data-original-text="Styles">Styles<i class="arrow down"></i></button>
          <div class="dropdown-content">

              type="text"
              placeholder="Type to filter"
              class="search-input"
            />
            <a href="#" class="all-option">All Styles</a>
            <a href="#">Contemporary</a>
            <a href="#">Eclectic</a>
            <a href="#">Modern</a>
            <a href="#">Traditional</a>

            <a href="#">Farmhouse</a>
          </div>
        </div>
        
        <button class="clear-filters-btn" id="clear-all">Clear All</button>
      </div>


      <section class="projects-section">
          <div class="container">
              <div id="projects-grid" class="projects-grid"></div>
          </div>
      </section>
      

<script>
    let allProjects = []; // ستخزن المشاريع القادمة من السيرفر
    const mainCategory = 'Decore';

    // 1. جلب البيانات من السيرفر
    async function fetchData(url) {
        const response = await fetch(url);
        return await response.json();
    }

    // 2. تحديث واجهة القائمة بالبيانات المستلمة
    function updateDropdownUI(dropdownElement, items, type) {
        const dropdownContent = dropdownElement.querySelector('.dropdown-content');
        const searchInputHtml = dropdownContent.querySelector('.search-input').outerHTML;
        const allOptionHtml = dropdownContent.querySelector('.all-option').outerHTML;

        let newLinksHtml = '';
        items.forEach(item => {
            newLinksHtml += `<a href="#" data-id="${item.id}">${item.name}</a>`;
        });
        dropdownContent.innerHTML = searchInputHtml + allOptionHtml + newLinksHtml;
        activateFilterLogic();
    }

    // 3. جلب الأقسام والمشاريع عند التحميل
    async function initPage() {
        try {
            // جلب الشجرة (الأقسام)
            const treeResponse = await fetchData('/api/tree.php'); // تأكد من المسار الصحيح
            if (treeResponse.success) {
                const decoreCategory = treeResponse.data.categories.find(c => c.name === mainCategory);
                if (decoreCategory) {
                    const targetDropdown = document.querySelector('.dropdown'); // أول dropdown للأثاث
                    updateDropdownUI(targetDropdown, decoreCategory.sub_categories);
                }
            }

            // جلب جميع المشاريع (تحتاج لإنشاء ملف PHP يقوم بعمل select لكل المشاريع)
            const projectsResponse = await fetchData('/api/get-sub-category.php');
            if (projectsResponse.success) {
                allProjects = projectsResponse.data.projects;
                renderProjects(allProjects.filter(p => p.category === mainCategory));
            }
        } catch (error) {
            console.error('خطأ في تحميل البيانات:', error);
        }
    }

    // 4. دالة رسم الكروت (كما هي)
    function renderProjects(data) {
        const grid = document.getElementById('projects-grid');
        grid.innerHTML = data.map(p => createCardHTML(p)).join('');
    }

    // 5. منطق الفلترة المحدث
    function activateFilterLogic() {
        document.querySelectorAll('.dropdown-content a').forEach(link => {
            link.onclick = function(e) {
                e.preventDefault();
                const filterValue = this.textContent.trim().toLowerCase();
                
                // تحديث نص الزر
                const btn = this.closest('.dropdown').querySelector('.dropbtn');
                btn.innerHTML = `${this.textContent} <i class="arrow down"></i>`;

                // فلترة البيانات المخزنة في allProjects
                const filtered = allProjects.filter(item => {
                    if (filterValue.includes('all')) return item.category === mainCategory;
                    return item.title.toLowerCase().includes(filterValue) || 
                           item.tag?.toLowerCase().includes(filterValue);
                });
                renderProjects(filtered);
            };
        });
    }

    document.addEventListener("DOMContentLoaded", initPage);
</script>

    <div id="footer-placeholder"></div>
      <script src="js/script.js"></script>
    </body>
  </html>
