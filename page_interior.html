<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="imges/img/fancy1.jfif" />
    <title>Fancy Design</title>
    <link rel="icon" href="imges/img/fancy1.jfif" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <div id="header-placeholder"></div>


    <!---->


<section class="projects-section">
    <p class="title">Magazine</p>
    <div class="container">
        <div id="interior-container" class="projects-grid"></div>
    </div>
</section>


    <div id="footer-placeholder"></div>

<script>
// 1. دالة موحدة لإنشاء تصميم الكرت
function createCardHTML(data) {
    return `
        <div class="project-card">
            <div class="card-image">
                <a href="view_interior.html?id=${data.id}">
                    <img src="${data.image}" alt="${data.title}">
                </a>
            </div>
            <div class="card-content">
                <h3 class="card-title">${data.title}</h3>
                <p class="card-description" style="font-size: 14px; color: #666; margin: 10px 0;">
                    ${data.description.substring(0, 70)}...
                </p>
                <div class="card-meta">
                    <span class="category" style="color: #999; font-size: 12px;">${data.category}</span>
                </div>      
            </div>
        </div>
    `;
}

// 2. دالة عرض المشاريع في الحاوية
function displayProjects() {
    const container = document.getElementById('interior-container');
    
    // التأكد من وجود الحاوية ومن أن البيانات قد تم تحميلها من ملف data_interior.js
    if (container && typeof interiorData !== 'undefined') {
        container.innerHTML = ""; // مسح المحتوى الحالي (إن وجد)
        
        interiorData.forEach(item => {
            container.innerHTML += createCardHTML(item);
        });
    } else {
        console.error("لم يتم العثور على interiorData. تأكد من مسار js/data_interior.js");
    }
}

// 3. تشغيل الدالة عند تحميل الصفحة
window.addEventListener('load', displayProjects);
</script>

    <script src="js/data_interior.js"></script>

    <script src="js/script.js"></script>
  </body>
</html>
