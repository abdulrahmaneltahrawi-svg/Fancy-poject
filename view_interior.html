<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interior View - Fancy Design</title>
    <link rel="icon" href="imges/img/fancy1.jfif" />
    <link rel="stylesheet" href="style.css" />
    <style>
        .view-wrapper {
            max-width: 1400px;
            margin: 100px auto;
            padding: 0 40px;
            display: flex;
            gap: 60px;
        }

        /* الجزء الأيسر: المعلومات (Fixed) */
        .info-sidebar {
    flex: 1;
    position: sticky;
    top: 50px; /* تقليل المسافة من الأعلى لزيادة مساحة العرض */
    height: calc(100vh - 100px); /* جعل الارتفاع مساوياً لطول الشاشة تقريباً */
    overflow-y: auto; /* إضافة شريط تمرير داخلي عند الحاجة */
    padding-right: 15px; /* مسافة بسيطة لمنع التصاق النص بشريط التمرير */
}

/* إخفاء شريط التمرير الافتراضي وتجميله (اختياري) */
.info-sidebar::-webkit-scrollbar {
    width: 4px;
}
.info-sidebar::-webkit-scrollbar-thumb {
    background: #eee;
    border-radius: 10px;
}

        .info-sidebar .category {
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #999;
            font-size: 13px;
            display: block;
            margin-bottom: 10px;
        }

        .info-sidebar h1 {
            font-size: 42px;
            margin-bottom: 25px;
            line-height: 1.2;
        }

        .info-sidebar .description {
            color: #666;
            line-height: 1.8;
            font-size: 16px;
            margin-bottom: 40px;
        }

        /* الجزء الأيمن: معرض الصور اللامحدود */
        .image-gallery {
            flex: 1.5;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-left: 100px;
        }

        .image-gallery img {
            width: 100%;
            max-width: 600px;
            height: auto;
            object-fit: cover;
            border-radius: 4px;
        }

        /* قسم You May Also Like */
        .related-section {
            max-width: 1400px;
            margin: 100px auto;
            padding: 0 40px;
            border-top: 1px solid #eee;
            padding-top: 60px;
        }

        .related-section h2 {
            font-size: 24px;
            margin-bottom: 40px;
            text-align: center;
        }

        /* الموبايل */
        @media (max-width: 992px) {
            .view-wrapper { flex-direction: column; }
            .info-sidebar { position: static; }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="view-wrapper">
        <aside class="info-sidebar">
            <span id="mag-category" class="category"></span>
            <h1 id="mag-title"></h1>
            <div id="mag-desc" class="description"></div>

        </aside>

        <main class="image-gallery" id="image-gallery">
            </main>
    </div>

    <section class="related-section">
        <h2>YOU MAY ALSO LIKE</h2>
        <div id="related-grid" class="projects-grid"></div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="js/data_interior.js"></script>
    <script>
       const params = new URLSearchParams(window.location.search);
const magId = params.get('id');

// البحث عن العنصر في المصفوفة
const currentItem = interiorData.find(m => m.id == magId);

if (currentItem) {
    // 1. القسم الأول: العنوان والنوع
    document.getElementById('mag-title').innerText = currentItem.title;
    document.getElementById('mag-category').innerText = currentItem.type || "Office";

    // 2. القسم الثاني: معرض الصور (Gallery)
    const galleryContainer = document.getElementById('image-gallery');
    galleryContainer.innerHTML = ""; // تنظيف الحاوية

    // عرض الصورة الرئيسية أولاً
    galleryContainer.innerHTML += `<img src="${currentItem.image}" alt="${currentItem.title}" class="main-img">`;

    // إضافة باقي الصور من مصفوفة الـ gallery
    if (currentItem.gallery && currentItem.gallery.length > 0) {
        currentItem.gallery.forEach(imgSrc => {
            galleryContainer.innerHTML += `<img src="${imgSrc}" alt="Gallery Image">`;
        });
    }

    // 3. القسم الثالث: الوصف الطويل (Description)
    // نستخدم innerHTML هنا لأن الوصف يحتوي على وسم ### وعلامات سطر جديدة
    // ملاحظة: إذا كنت تريد تحويل ### إلى وسم <h3> حقيقي، يمكنك استخدام replace بسيط:
    let formattedDesc = currentItem.description
        .replace(/### (.*)/g, '<h3>$1</h3>') // تحويل العناوين
        .replace(/\n/g, '<br>'); // الحفاظ على الفواصل

    document.getElementById('mag-desc').innerHTML = formattedDesc;

    // 4. القسم الرابع: العناصر المشابهة (Related Items)
    const relatedGrid = document.getElementById('related-grid');
    if (relatedGrid) {
        // تصفية البيانات لجلب العناصر التي لها نفس النوع باستثناء العنصر الحالي
        const relatedItems = interiorData
            .filter(item => item.id != currentItem.id && item.type === currentItem.type)
            .slice(0, 3); // عرض 3 عناصر فقط

        relatedItems.forEach(item => {
            relatedGrid.innerHTML += `
                <div class="project-card">
                    <div class="card-image">
                        <a href="view_interior.html?id=${item.id}">
                            <img src="${item.image}" alt="${item.title}">
                        </a>
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">${item.title}</h3>
                        <div class="card-meta">
                            <span class="category" style="color: gray; font-weight: bold; text-transform: uppercase; font-size: 12px;">${item.type || ""}</span>
                        </div>      
                    </div>
                </div>
            `;
        });
    }

} else {
    // إذا لم يجد الآيدي يرجع للصفحة الرئيسية
    window.location.href = "index.html";
}
    </script>
    <script src="js/script.js"></script>
</body>
</html>
