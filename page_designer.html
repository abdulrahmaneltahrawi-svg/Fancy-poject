<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="imges/img/fancy1.jfif" />
    <title>Fancy Design</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    

    <div id="header-placeholder"></div>

    <section class="projects-section">
      <div class="container" style="display: flex; align-items: flex-start; justify-content: flex-start; flex-direction: column;">
        <p class="title">Designers</p>
        <div id="designers-grid" class="projects-grid">
          <!-- سيتم تحميل المصممين هنا تلقائياً -->
        </div>
      </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="js/script.js"></script>
    <script src="js/auth.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const grid = document.getElementById('designers-grid');

        // جلب البيانات وعرضها في الشبكة
        FancyAPI.get('/admin/All_designer.php')
          .then(result => {
            if (result.success && result.data) {
              const designers = result.data || [];
              if (designers.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 50px; color: #999;">No designers found at the moment.</p>';
                return;
              }
              grid.innerHTML = designers.map(designer => {
                const displayName = designer.user_name || designer.company_type || "Designer";
                const location = [designer.city, designer.country].filter(Boolean).join(', ');
                const services = Array.isArray(designer.services) 
                  ? designer.services.join(', ') 
                  : (designer.services || '');

                return `
                <div class="project-card">
                  <div class="card-image">
                    <a href="view_designer.html?id=${designer.id || ''}">
                      <img src="${getSafeImageUrl(designer.avatar || designer.avatar_url)}" alt="${displayName}">
                    </a>
                  </div>
                  <div class="card-content">
                    <a href="view_designer.html?id=${designer.id || ''}" style="text-decoration: none; color: inherit;">
                      <h3 class="card-title">${displayName}</h3>
                    </a>
                    <div class="card-meta" style="margin-top: 10px;">
                      <span class="category" style="color: #999; font-weight: 460; text-transform: uppercase; font-size: 12px;">${designer.company_type || 'Designer'} ${location ? ' | ' + location : ''}</span>
                    </div>
                  </div>
                </div>
              `;}).join('');
            }
          })
          .catch(err => console.error("Error loading designers:", err));
      });
    </script>
  </body>
</html>
