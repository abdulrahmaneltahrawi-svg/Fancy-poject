<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fancy Design</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <style>
        .designers-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .designer-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            text-align: center;
            padding-bottom: 20px;
        }
        .designer-card:hover { transform: translateY(-5px); }
        .designer-img { width: 100%; height: 250px; object-fit: cover; }
        .designer-info h3 { margin: 15px 0 5px; font-size: 18px; color: #111; }
        .designer-info p { color: #888; font-size: 14px; margin-bottom: 15px; }
        .btn-profile {
            display: inline-block;
            padding: 8px 20px;
            background: #111;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
        }
    </style>
    
    <div id="header-placeholder"></div>

    <div id="designers-container" class="designers-container">
        <!-- سيتم تحميل المصممين هنا -->
    </div>

    <div id="footer-placeholder"></div>

    <script src="js/script.js"></script>
    <script src="js/designers.js"></script>
</body>
</html>
