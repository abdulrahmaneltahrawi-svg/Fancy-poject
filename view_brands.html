<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brand View</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: #f9f9f9; }
        .brand-header { background: #fff; padding-bottom: 20px; }
        .cover-photo { height: 300px; width: 100%; overflow: hidden; }
        .cover-photo img { width: 100%; height: 100%; object-fit: cover; }
        .brand-profile-bar { padding: 0 5%; position: relative; }
        .container-flex { display: flex; align-items: flex-end; max-width: 1200px; margin: 0 auto; }
        .brand-logo-container { width: 150px; height: 150px; background: #fff; border-radius: 50%; padding: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-right: 20px; margin-top: -75px; }
        .brand-logo-container img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .brand-main-info { padding-bottom: 20px; flex-grow: 1; }
        .brand-actions { padding-bottom: 20px; display: flex; gap: 10px; }
        .btn { padding: 10px 20px; text-decoration: none; border-radius: 5px; font-size: 14px; cursor: pointer; }
        .btn-black { background: #000; color: #fff; }
        .btn-edit { background: #eee; color: #000; border: 1px solid #ccc; }
        .hidden { display: none !important; }
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }

        @media (max-width: 768px) {
            .container-flex { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <section class="brand-header">
        <div class="cover-photo">
            <img id="brandCover" src="" alt="Cover">
        </div>
        <div class="brand-profile-bar">
            <div class="container-flex">
                <div class="brand-logo-container">
                    <img id="brandLogo" src="" alt="Logo">
                </div>
                <div class="brand-main-info">
                    <h1 id="brandName">...</h1>
                    <p id="brandLocation"></p>
                </div>
                <div class="brand-actions">
                    <a href="#" id="edit-brand-btn" class="btn btn-edit hidden">Edit Brand</a>
                    <a href="#" id="add-product-btn" class="btn btn-black hidden">Add new product +</a>
                </div>
            </div>
        </div>
    </section>

    <main class="brand-content">
        <section style="padding: 60px 5% 20px;">
            <p class="title">Brand</p>
            <p id="brandAbout" style="max-width: 1200px; line-height: 1.8; margin-top: 15px; direction: rtl; "></p>
        </section>
    

        <section class="products-section" style="padding: 40px 5% 80px;">
            <div class="container">
                <div style="width: 100%; margin-bottom: 30px;">
                    <p class="title" style="margin: 0;">Product</p>
                </div>
                <div class="projects-grid" id="productsGrid">
                    <!-- سيتم تحميل المنتجات هنا تلقائياً -->
                </div>
            </div>
        </section>
    </main>

    <script src="js/script.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/products.js"></script>
    <script src="js/brands.js"></script>
    <script>
        async function loadBrandPage() {
            const urlParams = new URLSearchParams(window.location.search);
            const brandId = urlParams.get('brand') || urlParams.get('id');

            if (!brandId) return;

            try {
                // استخدام FancyAPI الموحد بدلاً من fetch المباشر لتجنب أخطاء المسارات (404)
                const result = await FancyAPI.get(`/brands/get.php?brand_id=${brandId}`);
                
                if (result.success && result.data && result.data.brand) {
                    const brand = result.data.brand;
                    document.getElementById('brandName').innerText = brand.brand_name || 'علامة تجارية';
                    document.getElementById('brandAbout').innerText = brand.description || 'لا يوجد وصف متاح.';
                    // استبدل السطور القديمة بـ:
document.getElementById('brandCover').src = getSafeImageUrl(brand.cover_image || 'imges/img/fancy3.jfif');
document.getElementById('brandLogo').src = getSafeImageUrl(brand.logo || 'imges/img/fancy1.jfif');

                    // التحقق من الصلاحيات لإظهار الأزرار
                    const userData = JSON.parse(localStorage.getItem('userData'));
                    let showProductControls = false;
                    if (userData && userData.id == brand.user_id) {
                        // إظهار زر إضافة منتج
                        const addBtn = document.getElementById('add-product-btn');
                        addBtn.classList.remove('hidden');
                        addBtn.href = `add-product.html?brand_id=${brand.id}`;

                        // إظهار زر تعديل العلامة التجارية
                        const editBtn = document.getElementById('edit-brand-btn');
                        editBtn.classList.remove('hidden');
                        editBtn.href = `edit-brand.html?brand_id=${brand.id}`; // الرابط لصفحة التعديل

                        showProductControls = true;
                    }
                    
                    loadProducts('productsGrid', null, brand.id, showProductControls);
                } else {
                    console.error("Brand not found or API error:", result.message);
                    alert("عذراً، لم يتم العثور على بيانات هذه العلامة التجارية.");
                    window.location.href = 'page_brand.html';
                }
            } catch (error) { console.error(error); }
        }
        window.addEventListener('load', loadBrandPage);
    </script>
</body>
</html>
