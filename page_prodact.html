<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fancy Design - Products</title>
    <link rel="icon" href="imges/img/fancy1.jfif" />
    <link rel="stylesheet" href="style.css" />
    <style>
      .load-more-container {
        text-align: center;
        margin: 50px 0;
      }
      .btn-load-more {
        background: #000;
        color: #fff;
        padding: 12px 40px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        font-size: 16px;
        transition: background 0.3s;
      }
      .btn-load-more:hover {
        background: #333;
      }
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="header-placeholder"></div>

    <div class="filter-container">
      <!-- قائمة الأقسام الرئيسية -->
      <div class="dropdown">
        <button
          class="dropbtn"
          id="main-category-filter-btn"
          data-original-text="Categories"
        >
          Categories <i class="arrow down"></i>
        </button>
        <div class="dropdown-content" id="main-category-filter-content">
          <input
            type="text"
            placeholder="Type to filter"
            class="search-input"
          />
        </div>
      </div>

      <!-- قائمة الأقسام الفرعية -->
      <div class="dropdown" id="sub-category-dropdown">
        <button
          class="dropbtn"
          id="sub-category-filter-btn"
          data-original-text="Sub-categories"
        >
          Sub-categories <i class="arrow down"></i>
        </button>
        <div class="dropdown-content" id="sub-category-filter-content">
          <input
            type="text"
            placeholder="Type to filter"
            class="search-input"
          />
        </div>
      </div>

      <button class="clear-filters-btn" id="clear-all">Clear All</button>
    </div>

    <section class="projects-section">
      <div class="container" style="display: block;">
        <div id="projects-container" class="projects-grid"></div>
        <div id="load-more-container" class="load-more-container hidden">
          <button id="load-more-btn" class="btn-load-more">Load More</button>
        </div>
      </div>
    </section>

    <div id="footer-placeholder"></div>

    <script>
      let allProductsList = [];
      let displayedProductsCount = 0;
      let currentFilteredList = [];
      let selectedCategoryId = null;
      let selectedSubCategoryId = null;
      const productsLimit = 8;

      async function loadAllProductsWithPagination() {
        const grid = document.getElementById("projects-container");
        const loadMoreBtn = document.getElementById("load-more-btn");

        try {
          const result = await FancyAPI.get('/products/public-list.php');
          if (result.success && result.data && result.data.products) {
            allProductsList = result.data.products;
            currentFilteredList = [...allProductsList];
            
            if (allProductsList.length === 0) {
              grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 50px;">No products found.</p>';
              return;
            }

            renderNextProductBatch();
            loadMoreBtn.onclick = renderNextProductBatch;
          }
        } catch (error) {
          console.error("Error loading products:", error);
        }
      }

      function renderNextProductBatch() {
        const grid = document.getElementById("projects-container");
        const loadMoreWrapper = document.getElementById("load-more-container");
        
        const nextBatch = currentFilteredList.slice(displayedProductsCount, displayedProductsCount + productsLimit);
        
        const html = nextBatch.map(product => createProductCardHTML(product)).join('');
        
        grid.insertAdjacentHTML('beforeend', html);
        displayedProductsCount += nextBatch.length;

        if (displayedProductsCount >= currentFilteredList.length) {
          loadMoreWrapper.classList.add('hidden');
        } else {
          loadMoreWrapper.classList.remove('hidden');
        }
      }

      function resetPagination() {
        const grid = document.getElementById("projects-container");
        const loadMoreWrapper = document.getElementById("load-more-container");
        grid.innerHTML = '';
        displayedProductsCount = 0;
        loadMoreWrapper.classList.remove('hidden');
        renderNextProductBatch();
      }

      function applyFilters() {
        let filtered = [...allProductsList];
        
        if (selectedCategoryId) {
          filtered = filtered.filter(p => p.category_id == selectedCategoryId);
        }
        if (selectedSubCategoryId) {
          filtered = filtered.filter(p => p.sub_category_id == selectedSubCategoryId || p.sub_category_name === selectedSubCategoryId);
        }
        
        currentFilteredList = filtered;
        resetPagination();
      }

      function clearSubCategoryOptions() {
        const container = document.getElementById("sub-category-filter-content");
        if (!container) return;
        container.querySelectorAll('a').forEach(el => el.remove());
      }

      async function loadMainCategoryFilters(containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        try {
          const result = await FancyAPI.get("/categories/list.php");
          if (result.success && result.data && result.data.categories) {
            const allLink = document.createElement("a");
            allLink.href = "#";
            allLink.textContent = "All Categories";
            allLink.onclick = (e) => {
              e.preventDefault();
              document.getElementById("main-category-filter-btn").innerHTML = `Categories <i class="arrow down"></i>`;
              document.getElementById("sub-category-filter-btn").innerHTML = `Sub-categories <i class="arrow down"></i>`;
              clearSubCategoryOptions();
              selectedCategoryId = null;
              selectedSubCategoryId = null;
              applyFilters();
            };
            container.appendChild(allLink);

            result.data.categories.forEach(cat => {
              const a = document.createElement("a");
              a.href = "#";
              a.textContent = cat.name;
              a.onclick = (e) => {
                e.preventDefault();
                document.getElementById("main-category-filter-btn").innerHTML = `${cat.name} <i class="arrow down"></i>`;
                selectedCategoryId = cat.id;
                selectedSubCategoryId = null;
                document.getElementById("sub-category-filter-btn").innerHTML = `Sub-categories <i class="arrow down"></i>`;
                loadSubCategoryFilters(cat.id, cat.name);
                applyFilters();
              };
              container.appendChild(a);
            });
          }
        } catch (error) {
          console.error("Error loading category filters:", error);
        }
      }

      async function loadSubCategoryFilters(categoryId, categoryName) {
        const container = document.getElementById("sub-category-filter-content");
        if (!container) return;
        
        try {
          clearSubCategoryOptions();
          
          const allLink = document.createElement("a");
          allLink.href = "#";
          allLink.textContent = `All ${categoryName}`;
          allLink.onclick = (e) => {
            e.preventDefault();
            document.getElementById("sub-category-filter-btn").innerHTML = `Sub-categories <i class="arrow down"></i>`;
            selectedSubCategoryId = null;
            applyFilters();
          };
          container.appendChild(allLink);

          const result = await FancyAPI.get(`/categories/get-sub-categories.php?category_id=${categoryId}`);
          
          if (result.success && result.data && result.data.sub_categories) {
            result.data.sub_categories.forEach(sub => {
              const a = document.createElement("a");
              a.href = "#";
              a.textContent = sub.name;
              a.onclick = (e) => {
                e.preventDefault();
                document.getElementById("sub-category-filter-btn").innerHTML = `${sub.name} <i class="arrow down"></i>`;
                selectedSubCategoryId = sub.name;
                applyFilters();
              };
              container.appendChild(a);
            });
          }
        } catch (error) {
          console.error("Error loading sub-category filters:", error);
        }
      }

      document.addEventListener("DOMContentLoaded", async () => {
        loadMainCategoryFilters("main-category-filter-content");
        loadAllProductsWithPagination();

        const clearBtn = document.getElementById("clear-all");
        if (clearBtn) {
          clearBtn.addEventListener("click", () => {
            document.querySelectorAll(".dropbtn").forEach((btn) => {
              const originalText = btn.getAttribute("data-original-text");
              btn.innerHTML = `${originalText} <i class="arrow down"></i>`;
            });
            clearSubCategoryOptions();
            selectedCategoryId = null;
            selectedSubCategoryId = null;
            currentFilteredList = [...allProductsList];
            resetPagination();
          });
        }
      });
    </script>
    <script src="js/products.js"></script>
    <script src="js/script.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
