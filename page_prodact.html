<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fancy Design</title>
    <link rel="icon" href="imges/img/fancy1.jfif" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <style>
      /**/
      .projects-section {
        padding: 60px 0;
        background-color: #fff;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

.title {
    margin-left: 150px;
    font-weight: bold;
    font-size: 28px;
    
    /* الحل هنا */
    display: flex;
    align-items: center; /* لتوسيط الخط عمودياً مع النص تماماً */
    gap: 15px;           /* مسافة بين الخط والكلمة */
}

.title::before {
    content: "";
    width: 5px;
    height: 35px;
    background-color: #000;
    display: inline-block; /* نغيرها من block إلى inline-block */
}

      .projects-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr); /* 3 أعمدة متساوية */
        gap: 30px; /* المسافة بين البطاقات */
      }

      .project-card {
        background: #fff;
        transition: transform 0.3s ease;
        cursor: pointer;
      }

      .project-card:hover {
        transform: translateY(-5px); /* حركة خفيفة عند تمرير الماوس */
      }

      .card-image {
        width: 100%;
        aspect-ratio: 16 / 10; /* يحافظ على تناسق أبعاد الصور */
        overflow: hidden;
        margin-bottom: 15px;
      }

      .card-image img {
        width: 100%;
        height: 100%;
        object-fit: cover; /* يضمن عدم تمدد الصورة بشكل خاطئ */
      }

      .card-title {
        font-size: 18px;
        font-weight: 600;
        color: #1a1a1a;
        margin: 10px 0;
        line-height: 1.4;
        /* تحديد النص بـ سطرين فقط لتناسق الارتفاع */
        display: -webkit-box;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .card-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .card-meta span {
        font-size: 12px;
        color: #999;
      }

      .category::after {
        content: "";
        margin-left: 5px;
      }

      .tag {
        display: block;
        width: 100%; /* لجعل التاج الفرعي يظهر في سطر جديد كالمثال */
        color: #ccc !important;
        margin-top: 5px;
      }

      /* استجابة الموبايل */
      @media (max-width: 992px) {
        .projects-grid {
          grid-template-columns: repeat(
            2,
            1fr
          ); /* عمودين في الأجهزة المتوسطة */
        }
      }

      @media (max-width: 600px) {
        .projects-grid {
          grid-template-columns: 1fr; /* عمود واحد في الموبايل */
        }
      }
    </style>

    <div id="header-placeholder"></div>

    <section class="projects-section">
    <p class="title">Product</p>
    <div class="container">
        <div id="projects-container" class="projects-grid"></div>
    </div>
</section>






    <div id="footer-placeholder"></div>

    <script>


// دالة موحدة لإنشاء تصميم الكرت (لضمان تشابه الشكل في القسمين)
function createCardHTML(data) {
    return `
        <div class="project-card">
            <div class="card-image">
                <a href="view.html?id=${data.id}">
                    <img src="${data.image}" alt="${data.title}">
                </a>
            </div>
            <div class="card-content">
                <h3 class="card-title">${data.title}</h3>
                <p class="card-description" style="font-size: 14px; color: #666;">
                    ${data.description.substring(0, 70)}...
                </p>
                <div class="card-meta">
                    <span class="category">${data.category}</span>
                </div>      
            </div>
        </div>
    `;
}

// تشغيل الدالة عند تحميل الصفحة
window.addEventListener('load', displayProjects);
    
    </script>

    <script src="js/data.js"></script>

    <script src="js/script.js"></script>
  </body>
</html>
