<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fancy Design</title>
    <link rel="icon" href="imges/img/fancy1.jfif" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    

    <div id="header-placeholder"></div>

    <section class="projects-section">
    <p class="title">Product</p>
    <div class="container">
        <div id="projects-container" class="projects-grid"></div>
    </div>
</section>






    <div id="footer-placeholder"></div>

<script>
// 1. دالة موحدة لإنشاء تصميم الكرت
function createCardHTML(data) {
    return `
        <div class="project-card">
            <div class="card-image">
                <a href="view.html?id=${data.id}">
                    <img src="${data.image}" alt="${data.title}">
                </a>
            </div>
            <div class="card-content">
                <h3 class="card-title">${data.title}</h3>
                <p class="card-description" style="font-size: 14px; color: #666; margin: 10px 0;">
                    ${data.category.substring(0, 70)}...
                </p>
                <div class="card-meta">
                    <span class="category" style="color: #ffb400; font-weight: bold; text-transform: uppercase; font-size: 12px;">${data.tag || ""}</span>
                </div>      
            </div>
        </div>
    `;
}

// 2. دالة عرض المشاريع الخاصة بالمنتجات
function displayProjects() {
    // استهداف الحاوية الخاصة بالمنتجات
    const container = document.getElementById('projects-container');
    
    // التأكد من وجود الحاوية ومن أن البيانات محملة من ملف js/data.js
    if (container && typeof projectsData !== 'undefined') {
        container.innerHTML = ""; // مسح أي محتوى تجريبي
        
        projectsData.forEach(project => {
            container.innerHTML += createCardHTML(project);
        });
    } else {
        console.error("خطأ: لم يتم العثور على projectsData أو حاوية العرض.");
    }
}

// 3. تشغيل الدالة فور تحميل الصفحة
window.addEventListener('load', displayProjects);
</script>
    <script src="js/data.js"></script>

    <script src="js/script.js"></script>
  </body>
</html>
