<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="imges/img/fancy1.jfif" />
    <title>Add New Product - Fancy Design</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .form-container {
        max-width: 600px;
        margin: 50px auto;
        padding: 50px;
        border: 1px solid #ddd;
        border-radius: 8px;
      }

      @media (max-width: 768px) {
        .form-container {
          margin: 30px 15px;
          padding: 25px;
        }
      }

      @media (max-width: 480px) {
        .form-container {
          margin: 20px 10px;
          padding: 15px;
        }
        .option-row {
          padding: 20px;
        }
      }
      .form-group {
        margin-bottom: 15px;
      }
      .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      .form-group input,
      .form-group textarea,
      .form-group select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }
      .submit-btn {
        background: #000;
        color: #fff;
        padding: 12px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
      }
      .options-container {
        margin-top: 20px;
        border-top: 2px solid #eee;
        padding-top: 20px;
      }
      .option-row {
        background: #f9f9f9;
        padding: 35px;
        border-radius: 6px;
        margin-bottom: 15px;
        position: relative;
        border: 1px solid #eee;
      }
      .remove-option {
        position: absolute;
        top: 10px;
        right: 10px;
        color: red;
        cursor: pointer;
        font-weight: bold;
      }

      /* ===== أنماط زر الإضافة السريعة للفئة الفرعية ===== */
      .select-with-add {
        display: flex;
        gap: 8px;
        align-items: flex-start;
      }
      .select-with-add select {
        flex: 1;
      }
      .btn-add-inline {
        flex-shrink: 0;
        width: 40px;
        height: 40px;
        background: #000;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 22px;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.3s;
        line-height: 1;
      }
      .btn-add-inline:hover {
        background: #333;
      }

      /* ===== الفورم المنبثق السريع ===== */
      .quick-add-form {
        display: none;
        margin-top: 10px;
        padding: 15px;
        background: #f9f9f9;
        border: 1px solid #ddd;
        border-radius: 6px;
      }
      .quick-add-form.open {
        display: block;
      }
      .quick-add-form .form-group {
        margin-bottom: 10px;
      }
      .quick-add-form .form-group:last-child {
        margin-bottom: 0;
      }
      .quick-add-form .form-group input,
      .quick-add-form .form-group select {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 13px;
      }
      .quick-add-form .form-group label {
        font-size: 13px;
        margin-bottom: 3px;
      }
      .quick-add-actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      .quick-add-actions button {
        flex: 1;
        padding: 8px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        font-weight: bold;
      }
      .quick-add-actions .btn-save {
        background: #5cb85c;
        color: #fff;
      }
      .quick-add-actions .btn-save:hover {
        background: #4cae4c;
      }
      .quick-add-actions .btn-cancel {
        background: #eee;
        color: #333;
      }
      .quick-add-actions .btn-cancel:hover {
        background: #ddd;
      }
      .quick-add-actions .btn-save:disabled {
        background: #999;
        cursor: not-allowed;
      }
      .quick-add-message {
        margin-top: 8px;
        padding: 8px;
        border-radius: 4px;
        text-align: center;
        font-size: 13px;
        display: none;
      }
      .quick-add-message.success {
        display: block;
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
      .quick-add-message.error {
        display: block;
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
    </style>
  </head>
  <body>
    <div id="header-placeholder"></div>
    <div class="form-container">
      <h2>Add new product</h2>
      <form id="productForm">
        <input type="hidden" name="brand_id" id="form_brand_id" />
        <div class="form-group">
          <label>Product name:</label>
          <input
            type="text"
            placeholder="Your product name here..."
            name="product_name"
            required
          />
        </div>

        <!-- ===== Category (بدون إضافة سريعة) ===== -->
        <div class="form-group">
          <label>Category:</label>
          <select name="category_id" id="category_select" required>
            <option value="">Choose category...</option>
          </select>
        </div>

        <!-- ===== Sub Category مع زر إضافة سريعة ===== -->
        <div class="form-group">
          <label>Sub Category:</label>
          <div class="select-with-add">
            <select name="sub_category_id" id="sub_category_select" required>
              <option value="">Choose category first...</option>
            </select>
            <button type="button" class="btn-add-inline" id="btnAddSubCategory" title="Add new sub category">+</button>
          </div>
          <!-- الفورم السريع لإضافة فئة فرعية جديدة -->
          <div class="quick-add-form" id="quickAddSubCategory">
            <div class="form-group">
              <label>New sub category name:</label>
              <input type="text" id="newSubCatName" placeholder="e.g. Sofas, Chairs..." />
            </div>
            <div class="form-group">
              <label>Sort order:</label>
              <input type="number" id="newSubCatSort" value="1" min="1" />
            </div>
            <div class="quick-add-actions">
              <button type="button" class="btn-save" id="btnSaveSubCategory">Save</button>
              <button type="button" class="btn-cancel" id="btnCancelSubCategory">Cancel</button>
            </div>
            <div class="quick-add-message" id="quickSubCatMessage"></div>
          </div>
        </div>

        <div class="form-group">
          <label>Main product image:</label>
          <input type="file" name="main_image" accept="image/*" required />
        </div>
        <div class="form-group">
          <label>Short description:</label>
          <textarea name="short_description" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label>Full description:</label>
          <textarea name="description" rows="5"></textarea>
        </div>

        <div class="form-group">
          <label>Technical Data:</label>
          <textarea name="technical_data" rows="3" placeholder="e.g. Material: Oak Wood, Weight: 20kg..."></textarea>
        </div>

        <div class="options-container">
          <h3>Product Options (Variants)</h3>
          <div id="options-list">
            <!-- Options will be added here -->
          </div>
          <button type="button" id="add-option-btn" style="background:#eee; color:#333; border:1px solid #ccc; padding:10px; border-radius:4px; cursor:pointer; margin-bottom:20px;">
            + Add another option
          </button>
        </div>

        <button type="submit" class="submit-btn">
          Send product for review
        </button>
      </form>
    </div>
    <script src="js/script.js"></script>
    <script src="js/categories.js"></script>
    <script src="js/products.js"></script>
    <script src="js/auth.js"></script>
    <script>
      const optionsList = document.getElementById("options-list");
      const addOptionBtn = document.getElementById("add-option-btn");

      // Function to create a new option row
      function createOptionRow() {
        const row = document.createElement("div");
        row.className = "option-row";
        row.innerHTML = `
          <span class="remove-option" onclick="this.parentElement.remove()">X</span>
          <div class="form-group">
            <label>Option Name (e.g. Color/Size):</label>
            <input type="text" class="opt-name" required placeholder="e.g. Red Small" />
          </div>
          <div class="option-fields-row" style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
              <label>Type/Size:</label>
              <input type="text" class="opt-size" placeholder="e.g. 120x60" />
            </div>
            <div class="form-group" style="flex: 1;">
              <label>SKU:</label>
              <input type="text" class="opt-sku" placeholder="Unique code" />
            </div>
            <div class="form-group" style="flex: 1;">
              <label>CBM:</label>
              <input type="text" class="opt-cbm" placeholder="Volume" />
            </div>
          </div>

          <style>
            @media (max-width: 480px) {
              .option-fields-row {
                flex-direction: column !important;
                gap: 0 !important;
              }
            }
          </style>
          <div class="form-group">
            <label>Option Image:</label>
            <input type="file" name="option_images[]" accept="image/*" />
          </div>
        `;
        optionsList.appendChild(row);
      }

      addOptionBtn.addEventListener("click", createOptionRow);

      document.addEventListener("DOMContentLoaded", () => {
        // Add at least one default option row
        createOptionRow();

        const urlParams = new URLSearchParams(window.location.search);
        const urlBrandId = urlParams.get("brand_id");

        // التأكد من تحديث بيانات المستخدم من السيرفر لجلب الـ brand_id الصحيح
        FancyAPI.get("/auth/me.php").then((result) => {
          if (result && result.success) {
            const user = result.data.user || result.data;
            localStorage.setItem("userData", JSON.stringify(user));

            if (user.account_type === "personal") {
              alert("Sorry, personal accounts cannot add products.");
              window.location.href = "index.html";
              return;
            }

            // الأولوية للمعرف في الرابط ثم المعرف في بيانات المستخدم
            const brandId = urlBrandId || user.brand_id;

            if (!brandId) {
              alert("Sorry, you must create a brand before adding products.");
              window.location.href = "add-brand.html";
              return;
            }
            document.getElementById("form_brand_id").value = brandId;

            // تحميل الأقسام من قاعدة البيانات عند فتح الصفحة
            loadCategoriesToSelect();
          } else {
            alert("You must log in first");
            window.location.href = "login.html";
          }
        });
      });

      async function loadCategoriesToSelect() {
        const catSelect = document.getElementById("category_select");
        try {
          const result = await FancyAPI.get("/categories/list.php");
          if (result.success && result.data && result.data.categories) {
            catSelect.innerHTML = '<option value="">Choose category...</option>';
            result.data.categories.forEach((cat) => {
              catSelect.add(new Option(cat.name, cat.id));
            });
          }
        } catch (error) {
          console.error("Error loading categories:", error);
        }
      }

      document
        .getElementById("category_select")
        .addEventListener("change", async function () {
          const subSelect = document.getElementById("sub_category_select");
          const catId = this.value;

          subSelect.innerHTML = '<option value="">Loading...</option>';

          if (catId) {
            const subCats = await loadSubCategoriesForFilter(catId);
            subSelect.innerHTML =
              '<option value="">Choose sub category...</option>';
            subCats.forEach((sub) => {
              subSelect.add(new Option(sub.name, sub.id));
            });
          } else {
            subSelect.innerHTML =
              '<option value="">Choose category first...</option>';
          }
        });

      // ============================================================
      // 🚀 الإضافة السريعة للفئة الفرعية فقط (Sub Category)
      // ============================================================
      const btnAddSubCategory = document.getElementById("btnAddSubCategory");
      const quickAddSubCategory = document.getElementById("quickAddSubCategory");
      const btnCancelSubCategory = document.getElementById("btnCancelSubCategory");
      const btnSaveSubCategory = document.getElementById("btnSaveSubCategory");
      const newSubCatName = document.getElementById("newSubCatName");
      const newSubCatSort = document.getElementById("newSubCatSort");
      const quickSubCatMessage = document.getElementById("quickSubCatMessage");

      // فتح/إغلاق فورم الإضافة السريعة للفئة الفرعية
      btnAddSubCategory.addEventListener("click", () => {
        const catId = document.getElementById("category_select").value;
        if (!catId) {
          alert("Please select a parent category first.");
          return;
        }
        quickAddSubCategory.classList.toggle("open");
        if (quickAddSubCategory.classList.contains("open")) {
          newSubCatName.focus();
          quickSubCatMessage.style.display = "none";
          quickSubCatMessage.className = "quick-add-message";
        }
      });

      btnCancelSubCategory.addEventListener("click", () => {
        quickAddSubCategory.classList.remove("open");
        newSubCatName.value = "";
        newSubCatSort.value = "1";
        quickSubCatMessage.style.display = "none";
        quickSubCatMessage.className = "quick-add-message";
      });

      // حفظ الفئة الفرعية الجديدة
      btnSaveSubCategory.addEventListener("click", async () => {
        const catId = document.getElementById("category_select").value;
        const name = newSubCatName.value.trim();

        if (!catId) {
          quickSubCatMessage.className = "quick-add-message error";
          quickSubCatMessage.textContent = "❌ Please select a parent category first.";
          quickSubCatMessage.style.display = "block";
          return;
        }

        if (!name) {
          quickSubCatMessage.className = "quick-add-message error";
          quickSubCatMessage.textContent = "❌ Please enter a sub category name.";
          quickSubCatMessage.style.display = "block";
          return;
        }

        btnSaveSubCategory.disabled = true;
        btnSaveSubCategory.textContent = "Saving...";

        const formData = new FormData();
        formData.append("category_id", catId);
        formData.append("name", name);
        formData.append("sort_order", newSubCatSort.value || 1);

        try {
          const result = await FancyAPI.post("/admin/create_sub_category.php", formData);

          if (result.success) {
            quickSubCatMessage.className = "quick-add-message success";
            quickSubCatMessage.textContent = `✅ "${name}" created!`;
            quickSubCatMessage.style.display = "block";

            // إعادة تحميل قائمة الفئات الفرعية واختيار الجديدة
            const subCats = await loadSubCategoriesForFilter(catId);
            const subSelect = document.getElementById("sub_category_select");
            subSelect.innerHTML = '<option value="">Choose sub category...</option>';
            subCats.forEach((sub) => {
              subSelect.add(new Option(sub.name, sub.id));
            });
            subSelect.value = result.data?.sub_category_id || "";

            // إغلاق الفورم بعد نجاح
            setTimeout(() => {
              quickAddSubCategory.classList.remove("open");
              newSubCatName.value = "";
              newSubCatSort.value = "1";
              quickSubCatMessage.style.display = "none";
              quickSubCatMessage.className = "quick-add-message";
            }, 1500);
          } else {
            quickSubCatMessage.className = "quick-add-message error";
            quickSubCatMessage.textContent = "❌ " + (result.message || "Error creating sub category");
            quickSubCatMessage.style.display = "block";
          }
        } catch (error) {
          quickSubCatMessage.className = "quick-add-message error";
          quickSubCatMessage.textContent = "❌ Connection error.";
          quickSubCatMessage.style.display = "block";
          console.error("Error:", error);
        } finally {
          btnSaveSubCategory.disabled = false;
          btnSaveSubCategory.textContent = "Save";
        }
      });

      // ============================================================
      // إرسال المنتج (كما هو)
      // ============================================================
      document
        .getElementById("productForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          // بناء FormData يدوياً لضمان الدقة
          const formData = new FormData();
          formData.append("brand_id", document.getElementById("form_brand_id").value);
          formData.append("product_name", this.elements["product_name"].value);
          formData.append("category_id", this.elements["category_id"].value);
          formData.append("sub_category_id", this.elements["sub_category_id"].value);
          formData.append("short_description", this.elements["short_description"].value);
          formData.append("description", this.elements["description"].value);
          formData.append("technical_data", this.elements["technical_data"].value);
          formData.append("main_image", this.elements["main_image"].files[0]);

          // Client-side validation for image sizes (3MB limit)
          const mainImage = formData.get("main_image");
          if (mainImage && mainImage.size > 3 * 1024 * 1024) {
            alert("Main product image exceeds the 3MB limit.");
            return;
          }

          const optionRows = document.querySelectorAll(".option-row");
          for (let i = 0; i < optionRows.length; i++) {
            const fileInput = optionRows[i].querySelector('input[type="file"]');
            if (fileInput.files.length > 0 && fileInput.files[0].size > 3 * 1024 * 1024) {
              alert(`Image for variant #${i + 1} exceeds the 3MB limit.`);
              return;
            }
          }

          // Collect options text data into a JSON array
          const optionsData = [];
          document.querySelectorAll(".option-row").forEach((row, index) => {
            optionsData.push({
              option_name: row.querySelector(".opt-name").value,
              type_size: row.querySelector(".opt-size").value,
              sku: row.querySelector(".opt-sku").value,
              cbm: row.querySelector(".opt-cbm").value,
            });
            // إرسال صور الخيارات كمصفوفة لتوافق create.php
            const optFile = row.querySelector('input[type="file"]').files[0];
            if (optFile) {
                formData.append("option_images[]", optFile);
            }
          });

          if (optionsData.length === 0) {
            alert("Please add at least one product option.");
            return;
          }

          formData.append("options", JSON.stringify(optionsData));

          // تحقق أخير قبل الإرسال
          if (!formData.get("brand_id")) {
            alert("Error: Brand ID not recognized. Please refresh the page.");
            return;
          }

          submitNewProduct(formData);
        });
    </script>
  </body>
</html>
