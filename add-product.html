<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="imges/img/fancy1.jfif" />
    <title>Add New Product - Fancy Design</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .form-container {
        max-width: 600px;
        margin: 50px auto;
        padding: 50px;
        border: 1px solid #ddd;
        border-radius: 8px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      .form-group input,
      .form-group textarea,
      .form-group select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .submit-btn {
        background: #000;
        color: #fff;
        padding: 12px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
      }
      .options-container {
        margin-top: 20px;
        border-top: 2px solid #eee;
        padding-top: 20px;
      }
      .option-row {
        background: #f9f9f9;
        padding: 15px;
        border-radius: 6px;
        margin-bottom: 15px;
        position: relative;
        border: 1px solid #eee;
      }
      .remove-option {
        position: absolute;
        top: 10px;
        right: 10px;
        color: red;
        cursor: pointer;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="header-placeholder"></div>
    <div class="form-container">
      <h2>Add new product</h2>
      <form id="productForm">
        <input type="hidden" name="brand_id" id="form_brand_id" />
        <div class="form-group">
          <label>Product name:</label>
          <input
            type="text"
            placeholder="Your product name here..."
            name="product_name"
            required
          />
        </div>
        <div class="form-group">
          <label>Category:</label>
          <select name="category_id" id="category_select" required>
            <option value="">Choose category...</option>
          </select>
        </div>
        <div class="form-group">
          <label>Sub Category:</label>
          <select name="sub_category_id" id="sub_category_select" required>
            <option value="">Choose category first...</option>
          </select>
        </div>
        <div class="form-group">
          <label>Main product image:</label>
          <input type="file" name="main_image" accept="image/*" required />
        </div>
        <div class="form-group">
          <label>Short description:</label>
          <textarea name="short_description" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label>Full description:</label>
          <textarea name="description" rows="5"></textarea>
        </div>

        <div class="form-group">
          <label>Technical Data:</label>
          <textarea name="technical_data" rows="3" placeholder="e.g. Material: Oak Wood, Weight: 20kg..."></textarea>
        </div>

        <div class="options-container">
          <h3>Product Options (Variants)</h3>
          <div id="options-list">
            <!-- Options will be added here -->
          </div>
          <button type="button" id="add-option-btn" style="background:#eee; color:#333; border:1px solid #ccc; padding:10px; border-radius:4px; cursor:pointer; margin-bottom:20px;">
            + Add another option
          </button>
        </div>

        <button type="submit" class="submit-btn">
          Send product for review
        </button>
      </form>
    </div>
    <script src="js/script.js"></script>
    <script src="js/categories.js"></script>
    <script src="js/products.js"></script>
    <script src="js/auth.js"></script>
    <script>
      const optionsList = document.getElementById("options-list");
      const addOptionBtn = document.getElementById("add-option-btn");

      // Function to create a new option row
      function createOptionRow() {
        const row = document.createElement("div");
        row.className = "option-row";
        row.innerHTML = `
          <span class="remove-option" onclick="this.parentElement.remove()">X</span>
          <div class="form-group">
            <label>Option Name (e.g. Color/Size):</label>
            <input type="text" class="opt-name" required placeholder="e.g. Red Small" />
          </div>
          <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
              <label>Type/Size:</label>
              <input type="text" class="opt-size" placeholder="e.g. 120x60" />
            </div>
            <div class="form-group" style="flex: 1;">
              <label>SKU:</label>
              <input type="text" class="opt-sku" placeholder="Unique code" />
            </div>
            <div class="form-group" style="flex: 1;">
              <label>CBM:</label>
              <input type="text" class="opt-cbm" placeholder="Volume" />
            </div>
          </div>
          <div class="form-group">
            <label>Option Image:</label>
            <input type="file" name="option_images[]" accept="image/*" />
          </div>
        `;
        optionsList.appendChild(row);
      }

      addOptionBtn.addEventListener("click", createOptionRow);

      document.addEventListener("DOMContentLoaded", () => {
        // Add at least one default option row
        createOptionRow();

        const urlParams = new URLSearchParams(window.location.search);
        const urlBrandId = urlParams.get("brand_id");

        // التأكد من تحديث بيانات المستخدم من السيرفر لجلب الـ brand_id الصحيح
        FancyAPI.get("/auth/me.php").then((result) => {
          if (result && result.success) {
            const user = result.data.user || result.data;
            localStorage.setItem("userData", JSON.stringify(user));

            if (user.account_type === "personal") {
              alert("Sorry, personal accounts cannot add products.");
              window.location.href = "index.html";
              return;
            }

            // الأولوية للمعرف في الرابط ثم المعرف في بيانات المستخدم
            const brandId = urlBrandId || user.brand_id;

            if (!brandId) {
              alert("Sorry, you must create a brand before adding products.");
              window.location.href = "add-brand.html";
              return;
            }
            document.getElementById("form_brand_id").value = brandId;

            // تحميل الأقسام من قاعدة البيانات عند فتح الصفحة
            loadCategoriesToSelect();
          } else {
            alert("You must log in first");
            window.location.href = "login.html";
          }
        });
      });

      async function loadCategoriesToSelect() {
        const catSelect = document.getElementById("category_select");
        try {
          const result = await FancyAPI.get("/categories/list.php");
          if (result.success && result.data && result.data.categories) {
            result.data.categories.forEach((cat) => {
              catSelect.add(new Option(cat.name, cat.id));
            });
          }
        } catch (error) {
          console.error("Error loading categories:", error);
        }
      }

      document
        .getElementById("category_select")
        .addEventListener("change", async function () {
          const subSelect = document.getElementById("sub_category_select");
          const catId = this.value; // استخدام المعرف (ID) بدلاً من الاسم

          subSelect.innerHTML = '<option value="">Loading...</option>';

          if (catId) {
            // استدعاء الأقسام الفرعية بناءً على القسم الرئيسي المختار
            const subCats = await loadSubCategoriesForFilter(catId);
            subSelect.innerHTML =
              '<option value="">Choose sub category...</option>';
            subCats.forEach((sub) => {
              subSelect.add(new Option(sub.name, sub.id));
            });
          } else {
            subSelect.innerHTML =
              '<option value="">Choose category first...</option>';
          }
        });

      document
        .getElementById("productForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          // بناء FormData يدوياً لضمان الدقة
          const formData = new FormData();
          formData.append("brand_id", document.getElementById("form_brand_id").value);
          formData.append("product_name", this.elements["product_name"].value);
          formData.append("category_id", this.elements["category_id"].value);
          formData.append("sub_category_id", this.elements["sub_category_id"].value);
          formData.append("short_description", this.elements["short_description"].value);
          formData.append("description", this.elements["description"].value);
          formData.append("technical_data", this.elements["technical_data"].value);
          formData.append("main_image", this.elements["main_image"].files[0]);

          // Client-side validation for image sizes (3MB limit)
          const mainImage = formData.get("main_image");
          if (mainImage && mainImage.size > 3 * 1024 * 1024) {
            alert("Main product image exceeds the 3MB limit.");
            return;
          }

          const optionRows = document.querySelectorAll(".option-row");
          for (let i = 0; i < optionRows.length; i++) {
            const fileInput = optionRows[i].querySelector('input[type="file"]');
            if (fileInput.files.length > 0 && fileInput.files[0].size > 3 * 1024 * 1024) {
              alert(`Image for variant #${i + 1} exceeds the 3MB limit.`);
              return;
            }
          }

          // Collect options text data into a JSON array
          const optionsData = [];
          document.querySelectorAll(".option-row").forEach((row, index) => {
            optionsData.push({
              option_name: row.querySelector(".opt-name").value,
              type_size: row.querySelector(".opt-size").value,
              sku: row.querySelector(".opt-sku").value,
              cbm: row.querySelector(".opt-cbm").value,
            });
            // إرسال صور الخيارات كمصفوفة لتوافق create.php
            const optFile = row.querySelector('input[type="file"]').files[0];
            if (optFile) {
                formData.append("option_images[]", optFile);
            }
          });

          if (optionsData.length === 0) {
            alert("Please add at least one product option.");
            return;
          }

          formData.append("options", JSON.stringify(optionsData));

          // تحقق أخير قبل الإرسال
          if (!formData.get("brand_id")) {
            alert("Error: Brand ID not recognized. Please refresh the page.");
            return;
          }

          submitNewProduct(formData);
        });
    </script>
  </body>
</html>
