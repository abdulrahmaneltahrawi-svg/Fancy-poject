<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="imges/img/fancy1.jfif" />
    <title>Add New Magazine - Fancy Design</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .form-container {
        max-width: 700px;
        margin: 50px auto;
        padding: 40px;
        border: 1px solid #ddd;
        border-radius: 12px;
        background: #fff;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      }
      .form-header {
        text-align: center;
        margin-bottom: 30px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #333;
      }
      .form-group input,
      .form-group textarea,
      .form-group select {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 15px;
      }
      .submit-btn {
        background: #000;
        color: white;
        padding: 15px 25px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        width: 100%;
        font-size: 17px;
        font-weight: bold;
        transition: background 0.3s;
      }
      .submit-btn:hover {
        background: #383838;
      }
    </style>
  </head>
  <body>
    <div id="header-placeholder"></div>

    <div class="form-container">
      <div class="form-header">
        <h2>Add New Magazine Entry</h2>
        <p>Share your architectural projects or interior design articles.</p>
      </div>
      <form id="magazineForm">
        <div class="form-group">
          <label>Article/Project Title:</label>
          <input type="text" name="title" required placeholder="Enter the headline here..." />
        </div>
        <div class="form-group">
          <label>Category:</label>
          <select name="category" required>
            <option value="">Choose a category...</option>
            <option value="Interior Design">Interior Design</option>
            <option value="Architecture">Architecture</option>
            <option value="Trends">Trends & News</option>
            <option value="Sustainable Design">Sustainable Design</option>
          </select>
        </div>
        <div class="form-group">
          <label>Type (Project/Article):</label>
          <input type="text" name="type" required placeholder="e.g. Architecture, Residential..." />
        </div>
        <div style="display: flex; gap: 20px;">
          <div class="form-group" style="flex: 1;">
            <label>City:</label>
            <input type="text" name="city" required />
          </div>
          <div class="form-group" style="flex: 1;">
            <label>State:</label>
            <input type="text" name="state" required />
          </div>
        </div>
        <div class="form-group">
          <label>Cover Image:</label>
          <input type="file" name="image" accept="image/*" required />
        </div>
        <div class="form-group">
          <label>Header Description:</label>
          <textarea name="header_description" rows="2" placeholder="A brief summary for the preview..." required></textarea>
        </div>
        <div class="form-group">
          <label>Full Description:</label>
          <textarea name="description" rows="10" placeholder="Write your full article or project details here..." required></textarea>
        </div>
        <button type="submit" class="submit-btn" id="publishBtn">Publish to Magazine</button>
      </form>
    </div>

    <div id="footer-placeholder"></div>

    <script src="js/script.js"></script>
    <script src="js/auth.js"></script>
    <script>
      document.getElementById('magazineForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('publishBtn');
        const formData = new FormData(this);

        btn.disabled = true;
        btn.innerText = 'Publishing...';

        const result = await FancyAPI.post('/project/create_project.php', formData);
        if (result.success) {
          alert('Magazine entry published successfully!');
          window.location.href = 'profile.html';
        } else {
          alert('Error: ' + (result.message || 'Failed to publish article.'));
          btn.disabled = false;
          btn.innerText = 'Publish to Magazine';
        }
      });
    </script>
  </body>
</html>
