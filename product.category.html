<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Category - Fancy Design</title>
    <link rel="icon" href="imges/img/fancy1.jfif" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="header-placeholder"></div>

    <div class="filter-container">
      <!-- قائمة الأقسام الرئيسية - يتم تحديثها ديناميكياً من list.php لتسهيل التنقل -->
      <div class="dropdown">
        <button
          class="dropbtn"
          id="main-category-filter-btn"
          data-original-text="Categories"
        >
          Categories <i class="arrow down"></i>
        </button>
        <div class="dropdown-content" id="main-category-filter-content">
          <input
            type="text"
            placeholder="Type to filter"
            class="search-input"
          />
        </div>
      </div>

      <div class="dropdown" id="sub-category-dropdown">
        <button
          class="dropbtn"
          id="sub-category-btn"
          data-original-text="sub-categories"
        >
          sub-categories <i class="arrow down"></i>
        </button>
        <div class="dropdown-content" id="sub-category-content">
          <input
            type="text"
            placeholder="Type to filter"
            class="search-input"
          />
          <a href="#" class="all-option">sub-categories</a>
        </div>
      </div>

      <button class="clear-filters-btn" id="clear-all">Clear All</button>
    </div>

    <section class="projects-section">
      <div
        class="container"
        style="display: flex; align-items: start; flex-direction: column"
      >
        <h1 id="category-title" class="title" style="margin-left:0;">Loading...</h1>
        <div id="projects-grid" class="projects-grid"></div>
      </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="js/script.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/products.js"></script>
    <script src="js/categories.js"></script>

    <script>
      let allCategoryProducts = []; // لتخزين كافة منتجات القسم للفلترة المحلية

      document.addEventListener("DOMContentLoaded", async () => {
        const params = new URLSearchParams(window.location.search);
        let catId = params.get("id");
        const categoryNameFromUrl = params.get("category_name");
        const subCategoryNameFromUrl = params.get("sub_category_name");

        // إذا لم يوجد ID، نحاول البحث عن ID القسم باستخدام الاسم
        if (categoryNameFromUrl && !catId) {
          const mainCategoriesResult = await FancyAPI.get("/categories/list.php");
          if (mainCategoriesResult.success && mainCategoriesResult.data && mainCategoriesResult.data.categories) {
            const foundCategory = mainCategoriesResult.data.categories.find(cat => cat.name === categoryNameFromUrl);
            if (foundCategory) {
              catId = foundCategory.id;
            }
          }
        }

        if (typeof loadMainCategories === "function") {
          loadMainCategories("main-category-nav");
        }

        if (!catId) {
          document.getElementById("category-title").innerText = "Section not found";
          return;
        }

        try {
          let result = await FancyAPI.get(
            `/products/public-list.php?category_id=${catId}`,
          );

          if (result.success && result.data) {
            const categoryName = result.data.category_name || "Products";
            document.getElementById("category-title").innerText = categoryName;
            updateFilterUI(categoryName);
            // No need to call loadMainCategoryFilters() here, it's already called above to populate the main category dropdown.

            allCategoryProducts = result.data.products || [];
            renderProducts(allCategoryProducts);

            await loadSubFilters(catId);
          } else {
            document.getElementById("projects-grid").innerHTML =
              "<p style='grid-column: 1/-1; text-align: center; padding: 50px;'>No products found.</p>";
          }

          // Apply sub-category filter if present in URL after initial load
          if (subCategoryNameFromUrl && allCategoryProducts.length > 0) {
            const filtered = allCategoryProducts.filter(
              (p) => p.sub_category_name === subCategoryNameFromUrl
            );
            renderProducts(filtered);
            if (document.getElementById("sub-category-btn")) {
                document.getElementById("sub-category-btn").innerHTML = `${subCategoryNameFromUrl} <i class="arrow down"></i>`;
            }
          }
        } catch (err) {
          console.error("Error loading products:", err);
        }

        const clearBtn = document.getElementById("clear-all");
        if (clearBtn) {
          clearBtn.addEventListener("click", () => {
            document.querySelectorAll(".dropbtn").forEach((btn) => {
              const originalText = btn.getAttribute("data-original-text");
              btn.innerHTML = `${originalText} <i class="arrow down"></i>`;
            });
            // When clearing filters, re-render all products for the main category
            renderProducts(allCategoryProducts); 
            
            document 
              .querySelectorAll(".search-input")
              .forEach((i) => (i.value = ""));
          });
        }
      });

      function updateFilterUI(categoryName) {
        const btn = document.getElementById("sub-category-btn");
        if (btn) {
          btn.setAttribute("data-original-text", `All ${categoryName}`);
          btn.innerHTML = `All ${categoryName} <i class="arrow down"></i>`;
        }

        const mainBtn = document.getElementById("main-category-filter-btn");
        if (mainBtn) {
          mainBtn.innerHTML = `${categoryName} <i class="arrow down"></i>`;
        }
      }

      async function loadSubFilters(catId) {
        try {
          const result = await FancyAPI.get(
            `/categories/get-sub-categories.php?category_id=${catId}`,
          );
          const subCategoryDropdownContent = document.getElementById("sub-category-content");

          if (
            result.success &&
            result.data &&
            result.data.sub_categories &&
            subCategoryDropdownContent
          ) {
            const subCategories = result.data.sub_categories;

            // Clear existing sub-category options except the "All" option
            subCategoryDropdownContent.querySelectorAll('a:not(.all-option)').forEach(el => el.remove());

            const allOption = document.createElement("a");
            allOption.href = "#";
            allOption.className = "all-option";
            allOption.textContent = `All ${document.getElementById("category-title").innerText}`;
            allOption.onclick = (e) => {
              e.preventDefault();
              document.getElementById("sub-category-btn").innerHTML =
                `${allOption.textContent} <i class="arrow down"></i>`;
              renderProducts(allCategoryProducts);
            };
            subCategoryDropdownContent.appendChild(allOption);

            subCategories.forEach((sub) => {
              const a = document.createElement("a");
              a.href = "#";
              a.setAttribute("data-sub-category-name", sub.name); // Add data attribute for easier selection
              a.textContent = sub.name;
              a.onclick = (e) => {
                e.preventDefault();
                document.getElementById("sub-category-btn").innerHTML =
                  `${sub.name} <i class="arrow down"></i>`;

                // Apply filter based on selected sub-category
                const filtered = allCategoryProducts.filter(
                  (p) =>
                    p.sub_category_id == sub.id || // Filter by sub_category_id
                    p.requested_sub_category_name === sub.name,
                );

                renderProducts(filtered);
              };
              subCategoryDropdownContent.appendChild(a);
            });

            // If subCategoryNameFromUrl is present, select it in the dropdown and filter
            if (subCategoryNameFromUrl) {
              const matchingSubCatLink = subCategoryDropdownContent.querySelector(`a[data-sub-category-name="${subCategoryNameFromUrl}"]`);
              if (matchingSubCatLink) {
                matchingSubCatLink.click(); // Simulate click to apply filter and update button text
              }
            }
          }
        } catch (err) {
          console.error("Error loading sub-filters:", err);
        }
      }

      function renderProducts(products) {
        const grid = document.getElementById("projects-grid");
        if (!products || products.length === 0) {
          grid.innerHTML =
            "<p style='grid-column: 1/-1; text-align: center; padding: 20px;'>No products yet.</p>";
          return;
        }
        grid.innerHTML = products
          .map((product) => createProductCardHTML(product))
          .join("");
      }
    </script>
  </body>
</html>
