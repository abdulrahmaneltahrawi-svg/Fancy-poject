<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fancy Design - View Project</title>
    <link rel="icon" href="imges/img/fancy1.jfif" />
    <link rel="stylesheet" href="style.css" />
    <style>
      /* التنسيقات الخاصة بالصفحة */
      .view-container {
        max-width: 1300px;
        margin: 20px auto;
        padding:  20px;
        background-color: white;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }
      .view-content {
        display: flex;
        flex-direction: row-reverse; /* لجعل التفاصيل على اليسار والصور على اليمين */
        gap: 40px;
        align-items: flex-start;

      }
      .view-image-section {
        flex: 2;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .view-image-section img {
        width: 100%;
        border-radius: 8px;
        max-height: 700px;
        object-fit: contain;
        background-color: #fdfdfd;
        border: 1px solid #eee;
      }
      .view-details-section {
        flex: 1;
        max-width: 450px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      
      /* تنسيق بوكس المصمم الجديد */
      .designer-info-box {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      .designer-info-box img {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        object-fit: contain;
        background: #eee;
        border: 3px solid #eee;
      }
      .designer-info-box h3 {
        margin: 0;
        font-size: 18px;
        color: #333;
      }
      .designer-info-box p {
        margin: 0;
        font-size: 13px;
        color: #888;
      }

      .view-details-section h1 {
        font-size: 28px;
        margin: 0;
        color: #222;
        line-height: 1.2;
      }

      .category-tag {
        color: #999;
        text-transform: uppercase;
        font-size: 14px;
        letter-spacing: 1px;
        display: block;
        margin-bottom: 10px;
      }
      .description-box { color: #555; line-height: 1.8; white-space: pre-line; }

      .overview {
        color: #000;
        font-size: 24px;
        display: flex;
        align-items: center;
        margin-bottom: 10px;
        font-weight: bold;
      }

      .price-btn {
        display: inline-flex;
        align-items: center;
        background: #000;
        color: #fff;
        padding: 15px 25px;
        text-decoration: none;
        border-radius: 5px;
        gap: 15px;
        transition: 0.3s;
        font-weight: bold;
        font-size: 20px;
      }
      .price-btn:hover {
        background: #333;
        transform: translateY(-3px);
      }
      .price-btn img {
        width: 30px;
        filter: brightness(0) invert(1);
      }
      .back-link {
        display: block;
        margin-top: 25px;
        color: #999;
        text-decoration: none;
        font-size: 20px;
      }

      /* تنسيق معرض الصور المصغر */
      .thumbnails-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 10px;
        margin-top: 10px;
      }

      .thumb-img {
        width: 100%;
        height: 140px;
        object-fit: cover;
        cursor: pointer;
        border: 1px solid #eee;
        border-radius: 4px;
        transition: transform 0.2s;
      }

      .thumb-img:hover {
        transform: scale(1.05);
      }
      
      /* قسم You May Also Like */
      .related-section {
        margin-top: 80px;
        border-top: 1px solid #eee;
        padding-top: 40px;
      }
      .related-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        margin: 30px;
      }
      .related-item {
        text-decoration: none;
        color: #000;
        font-size: 14px;
      }
      .related-item img {
        width: 100%;
        border-radius: 5px;
        margin-bottom: 10px;
        max-height: 400px;
      }
      .related-item img :hover {
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      .specs-section {
        margin-top: 10px;
        background: #fff;
        border-radius: 8px;
        font-size: 30px;
                margin-top: 10px;
        border-top: 1px solid #eee;
        padding-top: 5px;
      }
      .specs-section h4 {
        color: #8b8b8b;
        font-size: 15px;
      }
      .options-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 20px;
        margin-top: 20px;
      }

      .option-item {
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .opt-name-box {
        border: 2px solid #ddd;
        padding: 10px;
        border-radius: 6px;
        font-weight: bold;
        background: #fff;
        text-align: center;
        color: #929292;
        word-wrap: break-word;
        font-size: 14px;
        min-height: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        white-space: normal;
      }

      /* تمييز الخيار النشط: بوردر أسود وخط أسود */
      .option-item.active .opt-name-box {
        border-color: #000;
        color: #000;
      }

      .opt-type-box {
        border: 2px solid #000;
        padding: 10px;
        border-radius: 6px;
        background: #fff;
        font-size: 14px;
        min-height: 15px;
        color: #000;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 120px;
        width: fit-content;
        font-weight: bold;
        max-width: 100%;
        word-wrap: break-word;
      }
      
      .hidden {
        display: none !important;
      }

      /* تنسيق أيقونات التواصل الاجتماعي للمشاركة */
      .social-links {
        display: flex;
        gap: 12px;
        margin: 10px 0 20px 0;
      }
      .social-icon {
        width: 35px;
        height: 35px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: #e2e2e2;
        border: 1px solid #eee;
        transition: all 0.3s ease;
        cursor: pointer;
      }
      .social-icon:hover {
        background: #000;
      }
      .social-icon img {
        width: 20px;
        height: 20x;
        object-fit: contain;
      }
      .social-icon:hover img {
        filter: brightness(0) invert(1);
      }
    </style>
  </head>
  <body>
    <div id="header-placeholder"></div>

    <div class="view-container">
      <div class="view-content">
        <!-- جهة الصور (اليمين) -->
        <div class="view-image-section" id="image-gallery">
          <img id="project-image" src="" alt="Project Image" />
          <h4 style="margin: 20px 0 10px 0; font-size: 18px;">Project Gallery</h4>
          <div id="thumbnails" class="thumbnails-grid"></div>
        </div>

        <!-- جهة المعلومات (اليسار) -->
        <div class="view-details-section">
          <!-- بوكس معلومات المصمم -->
          

          <h1 id="project-name"></h1>
          <p id="project-location" style="font-size: 16px; color: #888; margin: 0; display: none;"></p>


          <div class="designer-info-box">
            <img id="designer-avatar-sidebar" src="imges/img/fancy1.jfif" alt="Designer">
            <div>
              <p>Design by</p>
              <h3 id="designer-name-sidebar">...</h3>
              <a id="designer-profile-link" href="#" style="color: #000; font-size: 12px; font-weight: bold;">View Profile</a>
            </div>
          </div>

          <span id="project-category" class="category-tag"></span>

          <div class="social-links">
            <a id="share-fb" href="#" target="_blank" class="social-icon" title="Share on Facebook">
              <img src="imges/icons/facebook-app-symbol.png" alt="Facebook">
            </a>
            <a id="share-tw" href="#" target="_blank" class="social-icon" title="Share on Twitter">
              <img src="imges/icons/twitter.png" alt="Twitter">
            </a>
            <a id="share-ln" href="#" target="_blank" class="social-icon" title="Share on LinkedIn">
              <img src="imges/icons/linkedin1.png" alt="LinkedIn">
            </a>
            <a id="share-pt" href="#" target="_blank" class="social-icon" title="Share on Pinterest">
              <img src="imges/icons/pinterest.png" alt="Pinterest">
            </a>
            <a href="javascript:void(0)" onclick="copyToClipboard()" class="social-icon" title="Copy Link">
              <img src="imges/icons/link.png" alt="Copy">
            </a>
          </div>

          <div class="description-box">
            <h4 class="overview" style="border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px;">Description</h4>
            <p id="project-desc"></p>
          </div>

          <div id="specs-container" class="specs-section hidden">
            <h4>Technical Data</h4>
             <div id="sku-container" class="hidden">
              <span style="font-size: 16px; font-weight: bold; color: #555;">SKU: </span>
              <span id="active-sku" style="font-size: 16px; font-weight: bold; color: #555;"></span>
            </div>
            <p id="project-specs" style="font-size: 18px; color: #555;"></p>
            <div id="cbm-container" class="hidden" style="margin-top: 5px;">
              <span style="font-size: 16px; font-weight: bold; color: #555;">CBM: </span>
              <span id="active-cbm" style="font-size: 16px; color: #555;"></span>
            </div>

          </div>

          

          <a
            id="whatsapp-btn"
            href="https://wa.me/966530559095"
            class="price-btn"
            style="margin-top: 10px; justify-content: center;"
          >
            <span>REQUEST PRICE INFO/DATA</span>
            <img
              style="filter: brightness(0) invert(1)"
              src="imges/icons/whatsapp1.png"
              alt="whatsapp"
            />
          </a>

          <a href="page_magazine.html" class="back-link">← Back to Magazine</a>
        </div>
      </div>
      <div class="related-section">
        <h3>You may also like</h3>
        <div id="related-products" class="related-grid"></div>
      </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="js/script.js"></script>
    <script src="js/products.js"></script>
    <script src="js/auth.js"></script>
    <script>
      function copyToClipboard() {
        navigator.clipboard.writeText(window.location.href).then(() => {
          alert("Link copied to clipboard!");
        });
      }

      // 1. جلب المعرف من الرابط
      const params = new URLSearchParams(window.location.search);
      // البحث عن المعرف سواء كان باسم id أو product_id لضمان التوافق
      const projectId = params.get("id");

      document.addEventListener("DOMContentLoaded", () => {
        if (projectId) {
          loadSingleMagazineDetails(projectId);
        } else {
          alert("Magazine ID is missing.");
          window.location.href = "index.html"; // أو أي صفحة أخرى مناسبة
        }
      });

      async function loadSingleMagazineDetails(id) {
        try {
          const result = await FancyAPI.get(`/project/get_project.php?id=${id}`);

          if (result.success && result.data) {
            // التحقق مما إذا كانت البيانات مغلفة داخل كائن project أو تأتي مباشرة
            const project = result.data.project || result.data;
            
            console.log('Full Project data:', JSON.stringify(project, null, 2)); // Debugging line to see the full object
            console.log('Raw project.gallery_images:', project.gallery_images); // New debugging line

            // دالة داخلية لتنظيف الروابط وضمان عملها حتى لو كان الـ APP_URL في PHP خاطئاً
            const resolveImage = (pathOrUrl) => {
                if (!pathOrUrl) return getSafeImageUrl("");
                // إذا كان الرابط كاملاً، نستخرج الجزء الذي يبدأ بـ uploads لضمان دقة المسار
                if (typeof pathOrUrl === 'string' && pathOrUrl.includes('uploads/')) {
                    const relativePath = 'uploads/' + pathOrUrl.split('uploads/')[1];
                    return getSafeImageUrl(relativePath);
                }
                return getSafeImageUrl(pathOrUrl);
            };

            // تحديث الصورة الرئيسية باستخدام المحلل الذكي
            document.getElementById('project-image').src = resolveImage(project.cover_image_url || project.cover_image || project.image_url);
            // تحديث الفئة والنوع
            document.getElementById('project-category').innerText = `${project.category || 'N/A'} / ${project.type || 'N/A'}`;
            // تحديث العنوان
            document.getElementById('project-name').innerText = project.title;

            // تحديث معلومات المصمم في البوكس الجانبي
            document.getElementById('designer-name-sidebar').innerText = project.designer_name || "Designer";
            document.getElementById('designer-profile-link').href = `view_designer.html?id=${project.designer_id}`;

            // تحديث الموقع واسم المصمم
            const locationElem = document.getElementById('project-location');
            if (locationElem) {
              const locationParts = [];
              if (project.city) locationParts.push(project.city);
              if (project.state) locationParts.push(project.state);
              
              if (locationParts.length > 0) {
                locationElem.innerText = locationParts.join(', ');
                locationElem.style.display = 'block';
              } else {
                locationElem.style.display = 'none';
              }
            }

            // تحديث الوصف الكامل
            document.getElementById('project-desc').innerText = project.description || project.header_description || 'No description available.';

            // تحديث روابط التواصل الاجتماعي للمشاركة
            const currentUrl = encodeURIComponent(window.location.href);
            const projectTitle = encodeURIComponent(project.title);
            const projectImg = encodeURIComponent(resolveImage(project.cover_image_url || project.cover_image));

            document.getElementById('share-fb').href = `https://www.facebook.com/sharer/sharer.php?u=${currentUrl}`;
            document.getElementById('share-tw').href = `https://twitter.com/intent/tweet?url=${currentUrl}&text=${projectTitle}`;
            document.getElementById('share-ln').href = `https://www.linkedin.com/sharing/share-offsite/?url=${currentUrl}`;
            document.getElementById('share-pt').href = `https://pinterest.com/pin/create/button/?url=${currentUrl}&media=${projectImg}&description=${projectTitle}`;

            // تحديث CBM و SKU للمجلة إذا كانت متوفرة في بيانات المشروع
            if (project.cbm || project.sku) {
                if (project.cbm) {
                    document.getElementById('active-cbm').innerText = project.cbm;
                    document.getElementById('cbm-container').classList.remove('hidden');
                }
                if (project.sku) {
                    document.getElementById('active-sku').innerText = project.sku;
                    document.getElementById('sku-container').classList.remove('hidden');
                }
                document.getElementById('specs-container').classList.remove('hidden');
            }

            // تحديث معرض الصور (Gallery)
            const thumbnailsGrid = document.getElementById('thumbnails');
            
            // دالة ذكية للبحث عن أول مصفوفة تحتوي على بيانات فعلياً
            const extractGallery = () => {
                const keys = ['gallery_images', 'project_images', 'images', 'gallery'];
                // البحث داخل كائن المشروع
                for (const k of keys) if (Array.isArray(project[k]) && project[k].length > 0) return project[k];
                // البحث في جذر الرد (result.data) في حال كانت الصور منفصلة
                for (const k of keys) if (Array.isArray(result.data[k]) && result.data[k].length > 0) return result.data[k];
                return [];
            };

            const galleryData = extractGallery();
            console.log('Final resolved gallery data:', galleryData);
            
            if (thumbnailsGrid && Array.isArray(galleryData) && galleryData.length > 0) {
              thumbnailsGrid.innerHTML = galleryData.map(imgUrl => `
                <img src="${resolveImage(imgUrl)}" class="thumb-img" onclick="document.getElementById('project-image').src = this.src" alt="Gallery Image">
              `).join('');
            } else if (thumbnailsGrid) {
              thumbnailsGrid.innerHTML = '<p style="font-size: 13px; color: #999;">No additional gallery images available.</p>';
            }

            // تحديث رابط الواتساب (إذا كان المصمم لديه رقم واتساب)
            const whatsappBtn = document.getElementById('whatsapp-btn');
            if (whatsappBtn && project.whatsapp_number) { // نفترض أن رقم الواتساب قد يأتي مع بيانات المصمم
              const message = encodeURIComponent(`Hello, I'm interested in the magazine entry "${project.title}" by ${project.designer_name}.`);
              whatsappBtn.href = `https://wa.me/${project.whatsapp_number}?text=${message}`;
            } else if (whatsappBtn) {
              whatsappBtn.style.display = 'none'; // إخفاء الزر إذا لم يتوفر رقم واتساب
            }
          } else {
            alert('Magazine entry not found: ' + (result.message || 'Unknown error'));
            window.location.href = 'index.html';
          }
        } catch (error) {
          console.error('Error loading magazine details:', error);
          alert('An error occurred while loading magazine details.');
          window.location.href = 'index.html';
        }
      }
    </script>
  </body>
</html>
