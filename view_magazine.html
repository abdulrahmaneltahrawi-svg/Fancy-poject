<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fancy Design - View Project</title>
    <link rel="icon" href="imges/img/fancy1.jfif" />
    <link rel="stylesheet" href="style.css" />
    <style>
      /* التنسيقات الخاصة بالصفحة */
      .view-container {
        max-width: 2000px;
        margin-left: auto;
        margin-right: auto;
        padding: 0 20px;
        margin-top: 20px; /* مسافة إضافية بسيطة تحت الهيدر */
      }
      .view-content {
        display: flex;
        align-items: flex-start; /* يجعل المحتوى يبدأ من الأعلى ويمتد لأسفل */
        gap: 25px;

      }
      .view-image-section {
        flex: 1.5;
      }
      .view-image-section {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .view-image-section img {
        width: 100%;
        border-radius: 8px;
        margin-right: 10px;
        border-right: 1px solid #eee;
        padding-right: 5px;
      }
      .view-details-section {
        flex: 1;
      }
      .view-details-section h1 {
        font-size: 30px;
        margin-bottom: 20px;
        position: relative;      
        min-height: 40px;
        margin: 0;
        color: #4d4c4c;
      }

      .category-tag {
        color: #999;
        text-transform: uppercase;
        font-size: 14px;
        letter-spacing: 1px;
        display: block;
        margin-bottom: 10px;
      }
      .description-box {
        color: #666;
        line-height: 1.8;
        margin-top: 20px;
        white-space: pre-line;
        border: 1px solid #eee;
        border-radius: 8px;
        margin-bottom: 20px;
        overflow: hidden;
        background: #fff;
      }

      .tabs-header {
        display: flex;
        border-bottom: 1px solid #eee;
        background: #fcfcfc;
      }

      .tab-btn {
        flex: 1;
        padding: 15px;
        border: none;
        background: none;
        cursor: pointer;
        font-size: 18px;
        font-weight: bold;
        color: #888;
        transition: 0.3s;
      }

      .tab-btn.active {
        color: #000;
        background: #fff;
        border-bottom: 2px solid #000;
      }

      .tab-pane {
        padding: 20px;
        display: none;
      }

      .tab-pane.active {
        display: block;
      }

      .overview {
        color: #000;
        font-size: 24px;
        display: flex;
        align-items: center;
        margin-bottom: 10px;
        font-weight: bold;
      }

      .description-box h4 {
        color: #000;
        font-size: 30px;
    

      }
      .price-btn {
        display: inline-flex;
        align-items: center;
        background: #000;
        color: #fff;
        padding: 15px 25px;
        text-decoration: none;
        border-radius: 5px;
        gap: 15px;
        transition: 0.3s;
        font-weight: bold;
        font-size: 20px;
      }
      .price-btn:hover {
        background: #333;
        transform: translateY(-3px);
      }
      .price-btn img {
        width: 30px;
        filter: brightness(0) invert(1);
      }
      .back-link {
        display: block;
        margin-top: 25px;
        color: #999;
        text-decoration: none;
        font-size: 20px;
      }

      /* تنسيق معرض الصور المصغر */
      .thumbnails-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 10px;
        margin-top: 15px;
      }

      .thumb-img {
        width: 100%;
        height: 100px;
        object-fit: cover;
        cursor: pointer;
        border: 1px solid #eee;
        border-radius: 4px;
        transition: transform 0.2s;
      }

      .thumb-img:hover {
        transform: scale(1.05);
      }
      
      /* قسم You May Also Like */
      .related-section {
        margin-top: 80px;
        border-top: 1px solid #eee;
        padding-top: 40px;
      }
      .related-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        margin: 30px;
      }
      .related-item {
        text-decoration: none;
        color: #000;
        font-size: 14px;
      }
      .related-item img {
        width: 100%;
        border-radius: 5px;
        margin-bottom: 10px;
        max-height: 400px;
      }
      .related-item img :hover {
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      .specs-section {
        margin-top: 10px;
        background: #fff;
        border-radius: 8px;
        font-size: 30px;
                margin-top: 10px;
        border-top: 1px solid #eee;
        padding-top: 5px;
      }
      .specs-section h4 {
        color: #8b8b8b;
        font-size: 15px;
      }
      .options-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 20px;
        margin-top: 20px;
      }

      .option-item {
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .opt-name-box {
        border: 2px solid #ddd;
        padding: 10px;
        border-radius: 6px;
        font-weight: bold;
        background: #fff;
        text-align: center;
        color: #929292;
        word-wrap: break-word;
        font-size: 14px;
        min-height: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        white-space: nowrap;
      }

      /* تمييز الخيار النشط: بوردر أسود وخط أسود */
      .option-item.active .opt-name-box {
        border-color: #000;
        color: #000;
      }

      .opt-type-box {
        border: 2px solid #000;
        padding: 10px;
        border-radius: 6px;
        background: #fff;
        font-size: 14px;
        min-height: 15px;
        color: #000;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 120px;
        width: fit-content;
        font-weight: bold;
      }
      
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="header-placeholder"></div>

    <div class="view-container">
      <div class="view-content">
        <div class="view-image-section" id="image-gallery">
          <img id="project-image" src="" alt="Project Image" />
          <div class="description-box">
            <div class="tabs-header">
              <button class="tab-btn active" onclick="switchTab('overview')">Overview</button>
              <button class="tab-btn" onclick="switchTab('gallery')">Gallery</button>
            </div>
            <div id="tab-overview" class="tab-pane active">
              <p id="project-desc"></p>
            </div>
            <div id="tab-gallery" class="tab-pane">
              <div id="thumbnails" class="thumbnails-grid"></div>
            </div>
          </div>
        </div>

        <div class="view-details-section">
          <span id="project-category" class="category-tag"></span>
          <h1 id="project-name"></h1>
          <p id="project-location" style="font-size: 18px; color: #888; margin-top: 5px; margin-bottom: 20px; font-weight: 300; display: none;"></p>
          

          <div id="variants-container" class="hidden" style="margin-top: 30px;">
            <h4 style="font-size: 15px; color: #555;">Options</h4>
            <div id="options-grid" class="options-grid"></div>
            <div id="type-display-wrapper" class="hidden" style="margin-top: 20px;">
              <p style="font-size: 15px; color: #555; margin-bottom: 5px;">Type, Shape, Size mm</p>
              <div id="active-option-type" class="opt-type-box"></div>
            </div>
          </div>

          <div id="specs-container" class="specs-section hidden">
            <h4>Technical Data</h4>
             <div id="sku-container" class="hidden">
              <span style="font-size: 18px; font-weight: bold; color: #555;"></span>
              <span id="active-sku" style="font-size: 16px; font-weight: bold; color: #555;"></span>
            </div>
            <p id="project-specs" style="font-size: 18px; color: #555;"></p>

          </div>

          

          <a
            id="whatsapp-btn"
            href="#"
            class="price-btn"
            style="margin-top: 30px"
          >
            <span>REQUEST PRICE INFO/DATA</span>
            <img
              style="filter: brightness(0) invert(1)"
              src="imges/icons/whatsapp1.png"
              alt="whatsapp"
            />
          </a>

          <a href="index.html" class="back-link">← Back to Projects</a>
        </div>
      </div>
      <div class="related-section">
        <h3>You may also like</h3>
        <div id="related-products" class="related-grid"></div>
      </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="js/script.js"></script>
    <script src="js/products.js"></script>
    <script src="js/auth.js"></script>
    <script>
      function switchTab(tabName, event) {
        // إخفاء كل التبويبات وإزالة الحالة النشطة من الأزرار
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        // إظهار التبويب المطلوب وتفعيل الزر
        document.getElementById('tab-' + tabName).classList.add('active');
        event.currentTarget.classList.add('active');
      }

      // 1. جلب المعرف من الرابط
      const params = new URLSearchParams(window.location.search);
      // البحث عن المعرف سواء كان باسم id أو product_id لضمان التوافق
      const projectId = params.get("id");

      document.addEventListener("DOMContentLoaded", () => {
        if (projectId) {
          loadSingleMagazineDetails(projectId);
        } else {
          alert("Magazine ID is missing.");
          window.location.href = "index.html"; // أو أي صفحة أخرى مناسبة
        }
      });

      async function loadSingleMagazineDetails(id) {
        try {
          const result = await FancyAPI.get(`/project/get_project.php?id=${id}`);

          if (result.success && result.data) {
            const project = result.data;

            // تحديث الصورة الرئيسية
            document.getElementById('project-image').src = getSafeImageUrl(project.cover_image_url);

            // تحديث الفئة والنوع
            document.getElementById('project-category').innerText = `${project.category || 'N/A'} / ${project.type || 'N/A'}`;

            // تحديث العنوان
            document.getElementById('project-name').innerText = project.title;

            // تحديث الموقع واسم المصمم
            const locationElem = document.getElementById('project-location');
            if (locationElem) {
              const locationParts = [];
              if (project.city) locationParts.push(project.city);
              if (project.state) locationParts.push(project.state);
              if (project.designer_name) locationParts.push(project.designer_name);
              
              if (locationParts.length > 0) {
                locationElem.innerText = locationParts.join(', ');
                locationElem.style.display = 'block';
              } else {
                locationElem.style.display = 'none';
              }
            }

            // تحديث الوصف الكامل
            document.getElementById('project-desc').innerText = project.description || project.header_description || 'No description available.';

            // إخفاء أقسام المنتجات غير ذات الصلة بالمجلة
            document.getElementById('variants-container').classList.add('hidden');
            document.getElementById('specs-container').classList.add('hidden');

            // تحديث معرض الصور (Gallery)
            const thumbnailsGrid = document.getElementById('thumbnails');
            if (thumbnailsGrid && project.gallery_images && project.gallery_images.length > 0) {
              thumbnailsGrid.innerHTML = project.gallery_images.map(imgUrl => `
                <img src="${getSafeImageUrl(imgUrl)}" class="thumb-img" onclick="document.getElementById('project-image').src = this.src" alt="Gallery Image">
              `).join('');
            } else if (thumbnailsGrid) {
              thumbnailsGrid.innerHTML = '<p style="text-align: center; grid-column: 1/-1;">No additional gallery images.</p>';
            }

            // تحديث رابط الواتساب (إذا كان المصمم لديه رقم واتساب)
            const whatsappBtn = document.getElementById('whatsapp-btn');
            if (whatsappBtn && project.whatsapp_number) { // نفترض أن رقم الواتساب قد يأتي مع بيانات المصمم
              const message = encodeURIComponent(`Hello, I'm interested in the magazine entry "${project.title}" by ${project.designer_name}.`);
              whatsappBtn.href = `https://wa.me/${project.whatsapp_number}?text=${message}`;
            } else if (whatsappBtn) {
              whatsappBtn.style.display = 'none'; // إخفاء الزر إذا لم يتوفر رقم واتساب
            }
          } else {
            alert('Magazine entry not found: ' + (result.message || 'Unknown error'));
            window.location.href = 'index.html';
          }
        } catch (error) {
          console.error('Error loading magazine details:', error);
          alert('An error occurred while loading magazine details.');
          window.location.href = 'index.html';
        }
      }
    </script>
  </body>
</html>
