<!DOCTYPE html>
<html lang="ar" dir="rtl">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container" style="margin-top: 50px; text-align: center;">
        <img id="brand-profile-logo" src="" style="width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 3px solid #eee;">
        <h1 id="brand-profile-name" style="margin-top: 20px;">جاري التحميل...</h1>
        <p id="brand-profile-desc" style="color: #666; max-width: 600px; margin: 20px auto;"></p>

        <p class="title">تصاميم المصمم</p>
        <div class="container">
            <div id="brand-products-grid" class="projects-grid"></div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="js/script.js"></script>
    <script src="js/products.js"></script>
    <script src="js/designers.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initBrandProfilePage();
        });
    </script>

</html>
